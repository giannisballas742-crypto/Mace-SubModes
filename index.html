<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mace SubModes Tiers • Rankings</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#0a0a0a; color:#e5e5e5; font-family:system-ui; }

.tab { transition:0.2s; }
.tab-active { background:#db3e3e; color:black; font-weight:700; box-shadow:0 0 20px rgba(219,62,62,0.6); }

.player-card {
  background:#1f2937;
  padding:10px;
  border-radius:12px;
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:8px;
}

.player-card:hover {
  transform:translateY(-3px);
  box-shadow:0 10px 20px rgba(219,62,62,0.4);
}

.player-img {
  width:40px;
  height:40px;
  border-radius:50%;
  border:2px solid #db3e3e;
}

.ht1-glow {
  box-shadow:0 0 15px #ff4d4d, 0 0 30px #ff4d4d;
}

.tier-header {
  font-weight:800;
  padding:8px 16px;
  border-radius:999px;
  margin-bottom:10px;
}

.gold { color:#FFD700; font-weight:bold; }
.silver { color:#C0C0C0; font-weight:bold; }
.bronze { color:#CD7F32; font-weight:bold; }

input, select {
  background:#111;
  padding:6px 10px;
  border-radius:8px;
}
</style>
</head>

<body>
<div class="max-w-6xl mx-auto p-6">

<!-- HEADER -->
<div class="flex justify-between items-center mb-8">
  <h1 class="text-3xl font-black">Mace SubModes Tiers</h1>
  <a href="https://discord.gg/qHXgUhVj" target="_blank" class="bg-indigo-500 px-3 py-1 rounded">Join Discord</a>
</div>

<!-- CONTROLS -->
<div class="flex gap-4 mb-6">
  <input id="search" placeholder="Search player...">
  
  <select id="sortMode">
    <option value="Overall">Sort: Overall</option>
    <option value="Rod Mace">Rod Mace</option>
    <option value="OG Mace">OG Mace</option>
    <option value="LT Mace">LT Mace</option>
    <option value="Rocket Mace">Rocket Mace</option>
    <option value="HT Mace">HT Mace</option>
    <option value="Spear Mace">Spear Mace</option>
  </select>
</div>

<div id="rankings"></div>

</div>

<script>

const GOOGLE_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR1Z8SzplonsR2NbZ20b6TazugXY4YjX3sMeIxGG_cXErabJUERRszTqoOX7RPAYQXnlfnwbQemEP7k/pubhtml";

const tierOrder = ["HT1","LT1","HT2","LT2","HT3","LT3","HT4","LT4","HT5","LT5"];

const columnMap = {
  "Rod Mace": 4,
  "OG Mace": 5,
  "LT Mace": 6,
  "Rocket Mace": 7,
  "HT Mace": 8,
  "Spear Mace": 9
};

let allPlayers = [];

async function loadData(){

  const res = await fetch(GOOGLE_URL);
  const html = await res.text();

  const doc = new DOMParser().parseFromString(html,"text/html");
  const table = doc.querySelector("table.waffle");

  const rows = [...table.querySelectorAll("tr")].slice(1).map(tr =>
    [...tr.querySelectorAll("td")].map(td => td.innerText.trim())
  );

  allPlayers = rows.map(r=>{
    const name = r[2];

    const tiers = {};
    Object.keys(columnMap).forEach(mode=>{
      let tier = (r[columnMap[mode]] || "LT5").toUpperCase();
      tier = tier.split(" ")[0];
      tiers[mode] = tier;
    });

    return { name, tiers };
  });

  render();
}

function getScore(player){
  let score = 0;

  Object.values(player.tiers).forEach(tier=>{
    const index = tierOrder.indexOf(tier);
    if(index !== -1) score += (10 - index);
  });

  return score;
}

function render(){

  const search = document.getElementById("search").value.toLowerCase();
  const sortMode = document.getElementById("sortMode").value;

  let players = allPlayers.filter(p => p.name.toLowerCase().includes(search));

  // sorting
  players.sort((a,b)=>{
    if(sortMode==="Overall"){
      return getScore(b) - getScore(a);
    } else {
      return tierOrder.indexOf(a.tiers[sortMode]) - tierOrder.indexOf(b.tiers[sortMode]);
    }
  });

  let html = "";

  players.forEach((p,i)=>{
    const avatar = `https://mc-heads.net/avatar/${encodeURIComponent(p.name)}/64`;

    let medal = "";
    if(i===0) medal = `<span class="gold">🥇</span>`;
    else if(i===1) medal = `<span class="silver">🥈</span>`;
    else if(i===2) medal = `<span class="bronze">🥉</span>`;

    const isHT1 = Object.values(p.tiers).includes("HT1");

    html += `
    <div class="player-card ${isHT1 ? 'ht1-glow' : ''}">
      <img src="${avatar}" class="player-img">
      <div class="flex-1">${medal} ${i+1}. ${p.name}</div>
      <div>${sortMode==="Overall" ? getScore(p) : p.tiers[sortMode]}</div>
    </div>`;
  });

  document.getElementById("rankings").innerHTML = html;
}

// events
document.getElementById("search").oninput = render;
document.getElementById("sortMode").onchange = render;

loadData();

setInterval(loadData,30000);

</script>
</body>
</html>
