<script>

const CSV_URL = "https://docs.google.com/spreadsheets/d/17_uaAm_cPz3YcEARrH0hqKw8R3FAV-5U2Y3k_zFom5s/edit?gid=109";

const modes = ["overall","LT Mace","HT Mace","Rocket Mace","OG Mace","Rod Mace","Spear Mace"];

async function getData() {
  const res = await fetch(CSV_URL);
  const text = await res.text();

  const rows = text.trim().split("\n").map(r =>
    r.split(",").map(c => c.replace(/"/g,"").trim())
  );

  console.log("DATA:", rows);

  return rows;
}

function findColumn(headers, keyword) {
  return headers.findIndex(h => h.toLowerCase().includes(keyword.toLowerCase()));
}

async function loadMode(mode) {

  const rows = await getData();
  const headers = rows[0];
  const data = rows.slice(1);

  // Try to detect columns automatically
  const usernameCol = findColumn(headers, "user") !== -1 ? findColumn(headers, "user") : 0;

  const modeCol = findColumn(headers, mode);

  let html = "";

  // OVERALL
  if (mode === "overall") {

    const scores = {};

    data.forEach(row => {
      const name = row[usernameCol];
      let score = 0;

      headers.forEach((h, i) => {
        if (h.toLowerCase().includes("mace")) {
          const tier = parseInt(row[i]) || 5;

          if (tier === 1) score += 100;
          else if (tier === 2) score += 60;
          else if (tier === 3) score += 30;
          else if (tier === 4) score += 15;
          else score += 5;
        }
      });

      scores[name] = score;
    });

    const sorted = Object.entries(scores).sort((a,b)=>b[1]-a[1]);

    html += `<div class="space-y-4">`;

    sorted.forEach(([name,score],i)=>{
      html += `
      <div class="player-card flex justify-between">
        <div>#${i+1} ${name}</div>
        <div>${score}</div>
      </div>`;
    });

    html += `</div>`;
  }

  // GAMEMODE
  else {

    if (modeCol === -1) {
      document.getElementById("content").innerHTML =
        `<p class="text-red-400">Column not found for ${mode}</p>`;
      return;
    }

    const tiers = {};

    data.forEach(row=>{
      const name = row[usernameCol];
      const tier = row[modeCol] || "5";

      if (!tiers[tier]) tiers[tier] = [];
      tiers[tier].push(name);
    });

    Object.keys(tiers).sort((a,b)=>a-b).forEach(tier=>{
      html += `
      <div class="tier-box mb-8">
        <div class="tier-header">Tier ${tier}</div>
        <div class="p-4 grid grid-cols-2 md:grid-cols-3 gap-3">
          ${tiers[tier].map(name=>`<div class="player-card">${name}</div>`).join("")}
        </div>
      </div>`;
    });
  }

  document.getElementById("content").innerHTML = html;
}

</script>
