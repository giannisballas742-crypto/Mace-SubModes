<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  /* ----- BASE & PARTICLES (enhanced) ----- */
  body {
    background: #0a0a0a;
    color:#e5e5e5;
    font-family:system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;

  #particles {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    pointer-events: none;
    background: radial-gradient(circle at center, rgba(219, 62, 62, 0.22) 0%, rgba(219, 62, 62, 0.05) 40%, transparent 80%);
  }
  body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(ellipse at 20% 50%, rgba(219,62,62,0.12) 0%, transparent 60%),

    z-index: -1;
  }
  .particle {

    animation: floatParticle linear infinite;
    box-shadow: 0 0 10px #db3e3e;
  }
  @keyframes floatParticle {
    0% { transform: translateY(100vh) scale(0.4); opacity: 0; }
    12% { opacity: 0.4; }
    88% { opacity: 0.4; }
    100% { transform: translateY(-100px) scale(1); opacity: 0; }

  .tab {
    transition: 0.2s;

  }
  .tab-active { background:#db3e3e; color:black; font-weight:700; box-shadow:0 0 20px rgba(219,62,62,0.6); }
  .player-card { padding:10px; border-radius:12px; display:flex; align-items:center; gap:12px; margin-bottom:8px; transition:0.2s; cursor:pointer; overflow: visible; }
  .player-card:hover { transform:translateY(-3px); box-shadow:0 10px 20px rgba(219,62,62,0.4); }
  .player-card.player-ht { background: #4b5563; }
  .player-card.player-lt { background: #1f2937; }

  .player-img { width:48px; height:48px; border-radius:50%; border:2px solid #db3e3e; flex-shrink:0; }
  [data-tooltip] {
    position: relative;
    cursor: help;
  }
  [data-tooltip]::after {
    content: attr(data-tooltip);
    position: absolute;
    bottom: 130%;
    left: 50%;
    transform: translateX(-50%);
    background: #0b0f1c;
    color: #ffecb3;
    padding: 10px 16px;
    border-radius: 18px;
    font-size: 0.95rem;
    font-weight: 500;
    line-height: 1.4;
    white-space: normal;
    min-width: 170px;
    max-width: 280px;
    width: max-content;
    text-align: center;
    letter-spacing: 0.3px;

    box-shadow: 0 12px 28px rgba(0,0,0,0.5), 0 0 0 1px rgba(219,62,62,0.3);

    pointer-events: none;
    transition: opacity 0.18s ease;
    opacity: 0;
    word-break: break-word;
    box-sizing: border-box;
  }
  [data-tooltip]:hover::after {

    visibility: visible;
  }
  .mode-icon-container[data-tooltip]::after {

  .modal { background:#1f2937; padding:20px; border-radius:24px; max-width:500px; width:90%; max-height:85vh; overflow-y:auto; border: 1px solid #db3e3e; box-shadow:0 20px 35px rgba(0,0,0,0.5); }

  .rank.ace { background: linear-gradient(135deg, #a0a0ff, #6c6cff); color: white; box-shadow: 0 0 6px #6c6cff; }
  .rank.specialist { background: linear-gradient(135deg, #6ab04c, #2ecc71); color: #1a3a1a; }
  .rank.cadet { background: linear-gradient(135deg, #3498db, #2980b9); color: white; }
  .rank.novice { background: linear-gradient(135deg, #9b59b6, #8e44ad); color: white; }
  .rank.rookie { background: linear-gradient(135deg, #95a5a6, #7f8c8d); color: white; }
  .rank.grandmaster { background: linear-gradient(135deg, #eab308, #facc15); color: #1e1a00; text-shadow: 0 0 4px gold; box-shadow: 0 0 12px #facc15; }
  .rank-large { font-size: 1rem !important; padding: 0.35rem 1rem !important; gap: 8px; border-radius: 32px; }
  .tab-icon { width: 36px; height: 36px; object-fit: contain; display: block; margin-bottom: 6px; filter: drop-shadow(0 0 2px rgba(219,62,62,0.5)); transition: transform 0.2s; }
  .tab-item {

  .tier-group-header.gold { background: linear-gradient(135deg, #ffd966, #ffb347); color: #2c1a00; box-shadow: 0 0 8px #ffb347; }

  .tier-column {

    padding: 0.8rem 0;

  }
  .tier-column .player-card {

  .tier-column .sub-tier-badge {

  /* ----- HOLO BUTTON EFFECT ----- */
  .holo-btn {
    background: linear-gradient(135deg, #2a2a35 0%, #1a1a24 100%);
    border: 1px solid rgba(219,62,62,0.3);
    padding: 8px 26px;
    border-radius: 40px;
    font-weight: 700;
    cursor: pointer;
    color: #f0f0f0;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
    backdrop-filter: blur(2px);
    box-shadow: 0 0 6px rgba(219,62,62,0.3);
  }
  .holo-btn::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: linear-gradient(115deg, rgba(255,255,255,0) 10%, rgba(255,255,255,0.25) 30%, rgba(255,255,255,0) 50%);
    transform: rotate(25deg);
    transition: transform 0.4s;
    pointer-events: none;
  }
  .holo-btn:hover::before {
    transform: rotate(25deg) translate(20%, 20%);
  }
  .holo-btn.active {
    background: linear-gradient(135deg, #db3e3e, #f06262);
    color: black;
    border-color: #ffb347;
    box-shadow: 0 0 14px #db3e3e;
  }
  .separator-line {

  if (mode === "Overall") {
    const sorted = [...allRows].sort((a,b)=>parseFloat(b[pointsCol]||0)-parseFloat(a[pointsCol]||0));
    sorted.forEach((r, idx) => { const name = r[nameCol]; if(!name) return; const pointsVal = parseFloat(r[pointsCol]||0); const avatar = `https://mc-heads.net/avatar/${encodeURIComponent(name)}/64`; const region = r[regionCol]; let medalClass="", medalIcon="", bgClass=""; if(idx===0){ medalClass="gold"; medalIcon="<i class='fas fa-medal medal-icon'></i>"; } else if(idx===1){ medalClass="silver"; medalIcon="<i class='fas fa-medal medal-icon'></i>"; } else if(idx===2){ medalClass="bronze"; medalIcon="<i class='fas fa-medal medal-icon'></i>"; } else { bgClass = "gray-bg"; } const rankBadge = getLargeRankBadge(pointsVal); let regionHTML = ""; const regionClass = getRegionClass(region); if (region && regionClass) regionHTML = `<span class="region-badge ${regionClass}">${region}</span>`; const pointsColorClass = idx < 3 ? "text-black" : "text-red-400"; const ptsSpanColorClass = idx < 3 ? "text-black" : "text-gray-300"; htmlOut += `<div class="player-card relative overflow-visible ${medalClass} ${bgClass}" data-player='${JSON.stringify(r).replace(/'/g, "&apos;")}' data-points="${pointsVal}">${idx < 3 ? `<div class="absolute inset-0 pointer-events-none" style="background: linear-gradient(135deg, rgba(255,215,0,0.25) 0%, rgba(192,192,192,0.2) 40%, rgba(205,127,50,0.2) 60%, rgba(0,0,0,0) 75%); clip-path: polygon(0 0, 70% 0, 55% 100%, 0% 100%);"></div>` : ""}<img src="${avatar}" class="player-img"><div class="flex-1 flex flex-col justify-center min-w-0"><div class="flex items-center flex-wrap gap-x-2 gap-y-1">${medalIcon}<span class="font-bold">${idx+1}.</span> ${escapeHtml(name)}${regionHTML}</div>${getModeIconsHTML(r)}</div><div class="flex items-center gap-4 relative z-10 flex-shrink-0 flex-wrap justify-end">${rankBadge}<div class="font-mono text-xl font-bold ${pointsColorClass} flex items-center gap-1">${r[pointsCol]} <span class="text-sm font-medium ${ptsSpanColorClass}">pts</span></div></div></div>`; });
  } else {
    htmlOut = renderModeGroupedByTier(mode);
  }
  document.getElementById("rankings").innerHTML = htmlOut;
  attachCardEvents();
  applySearchFilter();
}
function attachCardEvents() { document.querySelectorAll(".player-card").forEach(card => { card.onclick = () => { const p = JSON.parse(card.dataset.player.replace(/&apos;/g, "'")); showPlayerProfile(p); }; }); }
function applySearchFilter() { const term = document.getElementById("search-input").value.toLowerCase(); document.querySelectorAll("#rankings .player-card").forEach(card => { const text = card.textContent.toLowerCase(); card.style.display = text.includes(term) ? "flex" : "none"; }); }

function toggleRetiredMarker() {
  markRetired = !markRetired;
  const toggleBtn = document.getElementById("retiredToggleBtn");
  if (toggleBtn) {
    if (markRetired) {
      toggleBtn.classList.add("active");
      toggleBtn.innerHTML = '<i class="fas fa-toggle-on"></i>';
      toggleBtn.setAttribute("data-tooltip", "Show retired players (with R badge)");
    } else {
      toggleBtn.classList.remove("active");
      toggleBtn.innerHTML = '<i class="fas fa-toggle-off"></i>';
      toggleBtn.setAttribute("data-tooltip", "Hide retired players");
    }
  }
  // Reload current mode if it's not Overall
  if (currentActiveMode !== "Overall") {
    const currentActiveTab = document.querySelector("#tabs .tab-active");
    if (currentActiveTab) loadMode(currentActiveMode, currentActiveTab);
  }
}

const suggestionsDiv = document.getElementById("suggestions");
const searchInput = document.getElementById("search-input");
function updateSuggestions() { const term = searchInput.value.trim().toLowerCase(); if (!term) { suggestionsDiv.classList.add("hidden"); return; } const matches = allRows.filter(p => { const name = p[nameCol]; return name && name.toLowerCase().startsWith(term); }).slice(0, 8); if (matches.length === 0) { suggestionsDiv.classList.add("hidden"); return; } let html = ''; matches.forEach(p => { const name = p[nameCol]; html += `<div class="suggestion-item" data-name="${escapeHtml(name)}">${escapeHtml(name)}</div>`; }); suggestionsDiv.innerHTML = html; suggestionsDiv.classList.remove("hidden"); }
function hideSuggestions() { suggestionsDiv.classList.add("hidden"); }
function onSuggestionClick(e) { const target = e.target.closest('.suggestion-item'); if (!target) return; const name = target.getAttribute('data-name'); if (name) { searchInput.value = name; hideSuggestions(); searchAndShowProfile(); } }
searchInput.addEventListener("input", () => { updateSuggestions(); applySearchFilter(); });
suggestionsDiv.addEventListener("click", onSuggestionClick);
const searchWrapperDiv = document.getElementById("searchWrapper");
document.addEventListener("click", function(e) { if (!searchWrapperDiv.contains(e.target)) hideSuggestions(); });
function searchAndShowProfile() { const term = searchInput.value.trim().toLowerCase(); if (!term) return; const matchedPlayer = allRows.find(player => { const name = player[nameCol]; return name && name.toLowerCase().includes(term); }); if (matchedPlayer) showPlayerProfile(matchedPlayer); }

async function loadCSV() { const res = await fetch(CSV_URL); const text = await res.text(); const { headers, data } = parseCSV(text); allRows = data; nameCol = headers.find(h=>/name|player/i.test(h)) || headers[0]; pointsCol = headers.find(h=>/points/i.test(h)) || headers[1]; const allModes = ["Overall","LT Mace","HT Mace","Rocket Mace","OG Mace","Rod Mace","Spear Mace"]; const tabsDiv = document.getElementById("tabs"); tabsDiv.innerHTML = ""; allModes.forEach((mode, idx) => { const wrapper = document.createElement("div"); wrapper.className = "tab-item"; let iconUrl = mode === "Overall" ? OVERALL_ICON : modeIcons[mode] || ""; const img = document.createElement("img"); img.src = iconUrl; img.className = "tab-icon"; img.style.width = "36px"; img.style.height = "36px"; const btn = document.createElement("button"); btn.textContent = mode; btn.className = "tab px-4 py-2 bg-gray-800 rounded-xl font-medium"; if(idx === 0) btn.classList.add("tab-active"); btn.onclick = (e) => { e.stopPropagation(); loadMode(mode, btn); }; wrapper.appendChild(img); wrapper.appendChild(btn); wrapper.addEventListener("click", (e) => { if(e.target !== btn) btn.click(); }); tabsDiv.appendChild(wrapper); }); loadMode("Overall", document.querySelector("#tabs .tab-active")); }

const leaderboardView = document.getElementById("leaderboardView");
const discordView = document.getElementById("discordView");
const leaderboardBtn = document.getElementById("leaderboardModeBtn");
const discordBtn = document.getElementById("discordModeBtn");
function setView(view) {
  if(view === 'leaderboard') {
    leaderboardView.style.display = "block";
    discordView.style.display = "none";
    searchWrapperDiv.style.display = "flex";
    leaderboardBtn.classList.add("active");
    discordBtn.classList.remove("active");
    if (typeof currentActiveMode !== 'undefined') loadMode(currentActiveMode, document.querySelector(`#tabs .tab:first-child`));
    else loadCSV().then(() => {});
    applySearchFilter();
  } else {
    leaderboardView.style.display = "none";
    discordView.style.display = "block";
    searchWrapperDiv.style.display = "none";
    leaderboardBtn.classList.remove("active");
    discordBtn.classList.add("active");
  }
}
leaderboardBtn.onclick = () => setView('leaderboard');
discordBtn.onclick = () => setView('discord');
document.getElementById("instantJoinBtn")?.addEventListener("click", () => window.open("https://discord.gg/vSh3PfMyeG", "_blank"));
document.getElementById("searchButton").addEventListener("click", searchAndShowProfile);
document.getElementById("modal-close").onclick = () => { document.getElementById("player-modal").classList.add("hidden"); searchInput.value = ""; applySearchFilter(); hideSuggestions(); };
window.onload = () => { createParticles(); loadCSV().then(() => setView('leaderboard')); createDiscordParticles(); };
</script>
</body>
