<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mace SubModes Tiers • Rankings</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
body {
  background:#0a0a0a;
  color:#e5e5e5;
  font-family:system-ui;
  overflow-x:hidden;
}

#particles {
  position:fixed;
  inset:0;
  z-index:-1;
}

.player-card {
  background:#1f2937;
  padding:10px;
  border-radius:12px;
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:8px;
  cursor:pointer;
  transition:0.2s;
}

.player-card:hover {
  transform:translateY(-3px);
  box-shadow:0 10px 20px rgba(219,62,62,0.4);
}

.player-img {
  width:48px;
  height:48px;
  border-radius:50%;
  border:2px solid #db3e3e;
}

.region-badge {
  padding:2px 8px;
  border-radius:6px;
  font-size:0.8rem;
  color:#000;
  font-weight:600;
  margin-left:6px;
}

.region-badge.EU { background:#22c55e; }
.region-badge.AS { background:#3b82f6; }
.region-badge.NA { background:#ef4444; }
.region-badge.SA { background:#db2777; }
.region-badge.AU { background:#fbbf24; }

.rank { font-weight:700; margin-left:6px; }

.modal-bg {
  background:rgba(0,0,0,0.7);
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
}

.modal {
  background:#1f2937;
  padding:20px;
  border-radius:12px;
  width:320px;
}
</style>
</head>

<body>

<div id="particles"></div>

<div class="max-w-5xl mx-auto p-6">

<h1 class="text-3xl mb-6 font-bold">Mace Rankings</h1>

<div id="rankings"></div>

<div id="player-modal" class="hidden modal-bg">
  <div class="modal">
    <span id="modal-close" style="cursor:pointer;">✖</span>
    <div id="modal-content"></div>
  </div>
</div>

</div>

<script>

// PARTICLES
function createParticles(){
  const container=document.getElementById("particles");
  for(let i=0;i<60;i++){
    const p=document.createElement("div");
    p.style.position="absolute";
    p.style.width="3px";
    p.style.height="3px";
    p.style.background="#db3e3e";
    p.style.left=Math.random()*100+"%";
    p.style.top=Math.random()*100+"%";
    p.style.opacity=0.3;
    container.appendChild(p);
  }
}

// CSV
const CSV_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vR1Z8SzplonsR2NbZ20b6TazugXY4YjX3sMeIxGG_cXErabJUERRszTqoOX7RPAYQXnlfnwbQemEP7k/pub?output=csv";

let allRows=[], nameCol="", pointsCol="", regionCol="__region";

function parseCSV(text){
  const lines=text.split("\n").filter(l=>l.trim());
  const headers=lines[0].split(",");
  const data=lines.slice(1).map(l=>{
    const cells=l.split(",");
    const obj={};
    headers.forEach((h,i)=>obj[h]=cells[i]||"");
    obj["__region"]=cells[2]||"";
    return obj;
  });
  return {headers,data};
}

// RANK SYSTEM (POINT BASED)
function getRankHTML(points){
  points=parseFloat(points)||0;

  if(points>=100) return `<span class="rank"><i class="fas fa-crown"></i> Mace Master</span>`;
  if(points>=50) return `<span class="rank"><i class="fas fa-shield"></i> Mace Ace</span>`;
  if(points>=25) return `<span class="rank"><i class="fas fa-star"></i> Mace Specialist</span>`;
  if(points>=10) return `<span class="rank"><i class="fas fa-user-graduate"></i> Mace Cadet</span>`;
  if(points>=5) return `<span class="rank"><i class="fas fa-seedling"></i> Mace Novice</span>`;
  if(points>=1) return `<span class="rank"><i class="fas fa-feather"></i> Mace Rookie</span>`;
  return "";
}

function getModalRankHTML(points){
  return getRankHTML(points);
}

// LOAD
async function load(){
  const res=await fetch(CSV_URL);
  const text=await res.text();
  const {headers,data}=parseCSV(text);

  allRows=data;
  nameCol=headers[0];
  pointsCol=headers[1];

  render();
}

// RENDER
function render(){
  let sorted=[...allRows].sort((a,b)=>b[pointsCol]-a[pointsCol]);
  let html="";

  sorted.forEach((r,i)=>{
    const name=r[nameCol];
    const pts=r[pointsCol];
    const region=r[regionCol];

    let regionHTML=region?`<span class="region-badge ${region}">${region}</span>`:"";

    html+=`
    <div class="player-card" data-player='${JSON.stringify(r)}'>
      <img src="https://mc-heads.net/avatar/${name}" class="player-img">
      <div class="flex-1">
        ${i+1}. ${name} ${regionHTML} ${getRankHTML(pts)}
      </div>
      <div class="font-bold">${pts}</div>
    </div>`;
  });

  document.getElementById("rankings").innerHTML=html;

  document.querySelectorAll(".player-card").forEach(card=>{
    card.onclick=()=>{
      const p=JSON.parse(card.dataset.player);
      const region=p[regionCol];

      let regionHTML=region?`<span class="region-badge ${region}">${region}</span>`:"";

      document.getElementById("modal-content").innerHTML=`
        <h2 class="text-xl font-bold text-center">${p[nameCol]} ${regionHTML}</h2>
        <div class="text-center mt-3">${getModalRankHTML(p[pointsCol])}</div>
        <div class="text-center mt-4">Points: <b>${p[pointsCol]}</b></div>
      `;

      document.getElementById("player-modal").classList.remove("hidden");
    };
  });
}

document.getElementById("modal-close").onclick=()=>{
  document.getElementById("player-modal").classList.add("hidden");
};

window.onload=()=>{
  createParticles();
  load();
};

</script>

</body>
</html>
