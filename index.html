<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mace SubModes Tiers • Rankings</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #0a0a0a;
    color: #fff;
    margin: 0;
    padding: 0;
  }
  header {
    background: #db3e3e;
    padding: 15px;
    text-align: center;
    font-size: 28px;
    font-weight: bold;
  }
  nav {
    display: flex;
    justify-content: center;
    background: #222;
  }
  nav button {
    background: #333;
    border: none;
    color: #fff;
    padding: 10px 25px;
    cursor: pointer;
    font-size: 16px;
    transition: 0.2s;
    margin: 5px;
    border-radius: 8px;
  }
  nav button.active {
    background: #db3e3e;
    color: #fff;
  }
  nav button:hover {
    background: #db3e3e;
  }
  section {
    display: none;
    padding: 20px;
  }
  section.active {
    display: block;
  }
  .tiers-table {
    width: 100%;
    border-collapse: collapse;
  }
  .tiers-table th, .tiers-table td {
    border: 1px solid #444;
    padding: 10px;
    text-align: center;
  }
  .tiers-table th {
    background: #db3e3e;
    font-size: 18px;
  }
  .skin-img {
    width: 40px;
    height: 40px;
    border-radius: 5px;
  }
  .discord-link {
    display: flex;
    justify-content: center;
    margin-top: 50px;
  }
  .discord-link a {
    background: #7289da;
    color: #fff;
    text-decoration: none;
    padding: 15px 30px;
    font-size: 24px;
    border-radius: 8px;
    transition: 0.2s;
  }
  .discord-link a:hover {
    background: #5b6eae;
  }
</style>
</head>
<body>
<header>Mace SubModes Tiers</header>

<!-- Top Tabs -->
<nav>
  <button id="tab-rankings" class="active">Rankings</button>
  <button id="tab-discord">Discord</button>
</nav>

<section id="rankings" class="active">
  <table class="tiers-table">
    <thead>
      <tr>
        <th>#</th>
        <th>Player</th>
        <th>Skin</th>
        <th>Points</th>
      </tr>
    </thead>
    <tbody id="tiers-body">
      <!-- Players will appear here -->
    </tbody>
  </table>
</section>

<section id="discord">
  <div class="discord-link">
    <a href="https://discord.gg/qHXgUhVj" target="_blank">Join our Discord</a>
  </div>
</section>

<script>
  // Tabs functionality
  const tabRankings = document.getElementById('tab-rankings');
  const tabDiscord = document.getElementById('tab-discord');
  const sectionRankings = document.getElementById('rankings');
  const sectionDiscord = document.getElementById('discord');

  tabRankings.addEventListener('click', () => {
    tabRankings.classList.add('active');
    tabDiscord.classList.remove('active');
    sectionRankings.classList.add('active');
    sectionDiscord.classList.remove('active');
  });

  tabDiscord.addEventListener('click', () => {
    tabDiscord.classList.add('active');
    tabRankings.classList.remove('active');
    sectionDiscord.classList.add('active');
    sectionRankings.classList.remove('active');
  });

  // Google Sheet CSV link
  const GOOGLE_CSV_URL = "https://docs.google.com/spreadsheets/d/YOUR_SHEET_ID/pub?output=csv";

  async function fetchPlayers() {
    try {
      const res = await fetch(GOOGLE_CSV_URL);
      const text = await res.text();
      const rows = text.split('\n').slice(1); // skip header
      const players = rows.map(row => {
        const cols = row.split(',');
        return {
          name: cols[0],
          points: parseInt(cols[1]) || 0,
          skin: cols[2] || cols[0]
        };
      });
      players.sort((a,b) => b.points - a.points);
      return players.slice(0, 100);
    } catch (e) {
      console.error("Failed to fetch players:", e);
      return [];
    }
  }

  function displayPlayers(players) {
    const tbody = document.getElementById('tiers-body');
    tbody.innerHTML = '';
    players.forEach((p, i) => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${i+1}</td>
        <td>${p.name}</td>
        <td><img src="https://mc-heads.net/avatar/${p.skin}" class="skin-img" alt="${p.name}"></td>
        <td>${p.points}</td>
      `;
      tbody.appendChild(tr);
    });
  }

  async function updateLeaderboard() {
    const players = await fetchPlayers();
    displayPlayers(players);
  }

  // Initial load
  updateLeaderboard();

  // Auto-refresh every 30 seconds
  setInterval(updateLeaderboard, 30000);
</script>
</body>
</html>
