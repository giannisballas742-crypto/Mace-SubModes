<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mace SubModes Tiers • Rankings</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
body { background:#0a0a0a; color:#e5e5e5; font-family:system-ui; }
.tab { transition:0.2s; cursor:pointer; }
.tab-active { background:#db3e3e; color:black; font-weight:700; box-shadow:0 0 20px rgba(219,62,62,0.6); }
.player-card { background:#1f2937; padding:10px; border-radius:12px; display:flex; align-items:center; gap:10px; margin-bottom:8px; transition:0.2s; cursor:pointer; }
.player-card:hover { transform:translateY(-3px); box-shadow:0 10px 20px rgba(219,62,62,0.4); }
.player-img { width:40px; height:40px; border-radius:50%; border:2px solid #db3e3e; }
.tier-header { font-weight:800; padding:8px 16px; border-radius:999px; margin-bottom:10px; display:inline-block; }
.discord-btn { background:#7289da; padding:5px 12px; border-radius:8px; }
#search-input { padding:8px; border-radius:8px; width:100%; max-width:400px; margin-bottom:16px; background:#1f2937; color:#e5e5e5; border:none; }
.region-badge { padding:2px 6px; border-radius:6px; font-size:0.75rem; font-weight:600; margin-left:6px; }
.modal-bg { position:fixed; inset:0; background:rgba(0,0,0,0.7); display:flex; align-items:center; justify-content:center; z-index:50; }
.modal-content { background:#1f2937; padding:20px; border-radius:12px; max-width:400px; width:90%; position:relative; }
.modal-close { position:absolute; top:10px; right:10px; cursor:pointer; color:#e5e5e5; }
.modal-content h2 { font-size:1.5rem; font-weight:700; margin-bottom:10px; }
.modal-content .mode-row { display:flex; justify-content:space-between; margin-bottom:6px; }
</style>
</head>
<body>
<div class="max-w-6xl mx-auto p-6">

<!-- HEADER -->
<div class="flex justify-between items-center mb-6">
  <div class="flex items-center gap-4">
    <div class="w-14 h-14 bg-red-500 rounded-xl flex items-center justify-center text-black text-3xl font-bold">M</div>
    <div>
      <h1 class="text-4xl font-black">Mace SubModes Tiers</h1>
      <p class="text-red-400 text-sm">Mace PvP Rankings</p>
    </div>
  </div>
  <div class="text-right flex flex-col items-end gap-2">
    <a href="https://discord.gg/qHXgUhVj" target="_blank" class="discord-btn">
      <i class="fab fa-discord"></i> Join Discord
    </a>
    <div class="text-gray-400 text-sm">Your Server</div>
    <div class="text-red-400 font-mono">mcpvp.club</div>
  </div>
</div>

<!-- SEARCH -->
<input type="text" id="search-input" placeholder="Search players...">

<!-- TABS -->
<div id="tabs" class="flex gap-3 mb-6 flex-wrap"></div>

<h2 id="mode-title" class="text-2xl mb-6">Overall Rankings</h2>
<div id="rankings"></div>

</div>

<!-- MODAL -->
<div id="player-modal" class="hidden modal-bg">
  <div class="modal-content">
    <span class="modal-close">&times;</span>
    <img id="modal-avatar" class="w-20 h-20 rounded-full border-2 border-red-500 mx-auto mb-4">
    <h2 id="modal-name" class="text-center"></h2>
    <div id="modal-region" class="text-center mb-4 font-semibold"></div>
    <div id="modal-overall" class="text-center mb-4"></div>
    <div id="modal-modes"></div>
  </div>
</div>

<script>
// Google Sheet CSV link
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR1Z8SzplonsR2NbZ20b6TazugXY4YjX3sMeIxGG_cXErabJUERRszTqoOX7RPAYQXnlfnwbQemEP7k/pub?output=csv"; // <-- Replace with your published CSV link

// Tier order and colors
const tierOrder = ["HT1","LT1","HT2","LT2","HT3","LT3","HT4","LT4","HT5","LT5"];
const tierColors = {
  HT1:"#ff4d4d", LT1:"#ff9999",
  HT2:"#ffaa00", LT2:"#ffd27f",
  HT3:"#55ff55", LT3:"#aaffaa",
  HT4:"#55ffff", LT4:"#aaffff",
  HT5:"#5555ff", LT5:"#aaaaff"
};

const tabsDiv = document.getElementById("tabs");

// CSV parser
function parseCSV(text){
  const lines = text.split(/\r?\n/).filter(l=>l.trim());
  const headers = lines[0].split(/[,;]/).map(h=>h.replace(/"/g,'').trim());
  const data = lines.slice(1).map(l=>{
    const cells = l.split(/[,;]/).map(c=>c.replace(/"/g,'').trim());
    const obj = {};
    headers.forEach((h,i)=>obj[h]=cells[i]||"");
    return obj;
  });
  return { headers, data };
}

// Load CSV
let allRows = [];
let allModes = [];
let nameCol = "";
let regionCol = "";
let pointsCol = "";
async function loadCSV(){
  try{
    const res = await fetch(CSV_URL);
    const text = await res.text();
    const { headers, data } = parseCSV(text);
    allRows = data;

    // Auto-detect columns
    nameCol = headers.find(h=>/name|player/i.test(h)) || headers[0];
    regionCol = headers.find(h=>/region/i.test(h)) || null;
    pointsCol = headers.find(h=>/points/i.test(h)) || headers[1];

    allModes = headers.filter(h=>h!==nameCol && h!==regionCol && h!==pointsCol);
    // Remove empty modes (like Spear Mace with no players)
    allModes = allModes.filter(mode => allRows.some(r=>r[mode].trim()));
    allModes.unshift("Overall");

    // Build tabs
    tabsDiv.innerHTML = "";
    allModes.forEach((mode,i)=>{
      const btn = document.createElement("button");
      btn.textContent = mode;
      btn.className = "tab px-4 py-2 bg-gray-800 rounded-xl";
      if(i===0) btn.classList.add("tab-active");
      btn.onclick = ()=>loadMode(mode,btn);
      tabsDiv.appendChild(btn);
    });

    loadMode("Overall", document.querySelector("#tabs button"));
  }catch(e){
    document.getElementById("rankings").innerHTML="<p class='text-red-400 py-20'>Failed to load data</p>";
    console.error(e);
  }
}

// Load mode
function loadMode(mode,btn){
  document.querySelectorAll("#tabs button").forEach(b=>b.classList.remove("tab-active"));
  btn.classList.add("tab-active");
  document.getElementById("mode-title").textContent = mode+" Rankings";

  let htmlOut = "";

  if(mode==="Overall"){
    const scores = {};
    allRows.forEach(r=>{
      const name = r[nameCol].trim();
      if(!name) return;
      const score = parseInt(r[pointsCol]) || 0;
      scores[name] = score;
    });
    Object.entries(scores).sort((a,b)=>b[1]-a[1]).forEach(([name,score],i)=>{
      const row = allRows.find(r=>r[nameCol]===name);
      const avatar = `https://mc-heads.net/avatar/${encodeURIComponent(name)}/64`;
      const region = regionCol ? row[regionCol] : "";
      const color = region ? row[regionCol+" Color"] || "#888" : "#888";
      htmlOut += `<div class="player-card" onclick="openModal('${name}')">
        <img src="${avatar}" class="player-img">
        <div class="flex-1">${i+1}. ${name}${region ? `<span class="region-badge" style="background:${color}">${region}</span>` : ''}</div>
        <div>${score}</div>
      </div>`;
    });
  }else{
    allRows.forEach(r=>{
      const name = r[nameCol].trim();
      if(!name) return;
      const tier = (r[mode]||"LT5").toUpperCase();
      const region = regionCol ? r[regionCol] : "";
      const color = region ? r[regionCol+" Color"] || "#888" : "#888";
      const avatar = `https://mc-heads.net/avatar/${encodeURIComponent(name)}/64`;
      htmlOut += `<div class="player-card" onclick="openModal('${name}')">
        <img src="${avatar}" class="player-img">
        <div class="flex-1">${name}${region ? `<span class="region-badge" style="background:${color}">${region}</span>` : ''}</div>
        <div>${tier}</div>
      </div>`;
    });
  }

  document.getElementById("rankings").innerHTML = htmlOut || "<p class='text-gray-500 py-20'>No data yet...</p>";
}

// SEARCH
document.getElementById("search-input").addEventListener("input", e=>{
  const term = e.target.value.toLowerCase();
  document.querySelectorAll(".player-card").forEach(card=>{
    const name = card.querySelector("div").textContent.toLowerCase();
    card.style.display = name.includes(term) ? "flex" : "none";
  });
});

// MODAL
const modal = document.getElementById("player-modal");
const modalName = document.getElementById("modal-name");
const modalAvatar = document.getElementById("modal-avatar");
const modalRegion = document.getElementById("modal-region");
const modalOverall = document.getElementById("modal-overall");
const modalModes = document.getElementById("modal-modes");

function openModal(name){
  const row = allRows.find(r=>r[nameCol]===name);
  if(!row) return;
  modalName.textContent = name;
  modalAvatar.src = `https://mc-heads.net/avatar/${encodeURIComponent(name)}/128`;
  const region = regionCol ? row[regionCol] : "";
  const color = region ? row[regionCol+" Color"] || "#888" : "#888";
  modalRegion.innerHTML = region ? `<span class="region-badge" style="background:${color}">${region}</span>` : '';
  modalOverall.textContent = `Overall Points: ${row[pointsCol] || 0}`;
  modalModes.innerHTML = "";
  allModes.slice(1).forEach(mode=>{
    if(!row[mode]) return;
    const tier = row[mode];
    modalModes.innerHTML += `<div class="mode-row"><span>${mode}</span><span>${tier}</span></div>`;
  });
  modal.classList.remove("hidden");
}

document.querySelector(".modal-close").onclick = ()=>{ modal.classList.add("hidden"); };
modal.onclick = e=>{ if(e.target===modal) modal.classList.add("hidden"); };

// Init
loadCSV();

// Auto-refresh every 30s
setInterval(()=>{
  const active = document.querySelector(".tab-active");
  if(active) loadMode(active.textContent,active);
},30000);
</script>
</body>
</html>
