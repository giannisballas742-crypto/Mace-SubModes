<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mace SubModes Tiers • Rankings</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
body {
  background: #0a0a0a;
  color:#e5e5e5;
  font-family:system-ui;
  overflow-x: hidden;
  position: relative;
}
/* ===== ENHANCED RED BACKGROUND & PARTICLES ===== */
#particles {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
  pointer-events: none;
  /* Stronger red radial gradient core + wider spread */
  background: radial-gradient(circle at center, rgba(219, 62, 62, 0.22) 0%, rgba(219, 62, 62, 0.05) 40%, transparent 80%);
}
/* additional side red glow layers */
body::before {
  content: '';
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: radial-gradient(ellipse at 20% 50%, rgba(219,62,62,0.12) 0%, transparent 60%),
              radial-gradient(ellipse at 90% 40%, rgba(219,62,62,0.12) 0%, transparent 60%);
  pointer-events: none;
  z-index: -1;
}
.particle {
  position: absolute;
  background: #db3e3e;
  border-radius: 50%;
  opacity: 0.35;
  animation: floatParticle linear infinite;
  box-shadow: 0 0 10px #db3e3e;
}
@keyframes floatParticle {
  0% { transform: translateY(100vh) scale(0.4); opacity: 0; }
  12% { opacity: 0.4; }
  88% { opacity: 0.4; }
  100% { transform: translateY(-100px) scale(1); opacity: 0; }
}
.tab { transition:0.2s; cursor:pointer; }
.tab-active { background:#db3e3e; color:black; font-weight:700; box-shadow:0 0 20px rgba(219,62,62,0.6); }
.player-card { background:#1f2937; padding:10px; border-radius:12px; display:flex; align-items:center; gap:12px; margin-bottom:8px; transition:0.2s; cursor:pointer; }
.player-card:hover { transform:translateY(-3px); box-shadow:0 10px 20px rgba(219,62,62,0.4); }
.player-img { width:48px; height:48px; border-radius:50%; border:2px solid #db3e3e; flex-shrink:0; }
.tier-header { font-weight:800; padding:8px 16px; border-radius:999px; margin-bottom:10px; display:inline-block; }
.discord-btn { background:#7289da; padding:5px 12px; border-radius:8px; }
#search-input { padding:8px; border-radius:8px; width:100%; max-width:400px; margin-bottom:16px; background:#1f2937; color:#e5e5e5; border:none; }

/* Region Colors */
.region-badge {
  padding:2px 8px;
  border-radius:6px;
  font-size:0.8rem;
  color:#000;
  font-weight:600;
  margin-left:6px;
}
.region-badge.EU { background:#22c55e; }
.region-badge.AS { background:#3b82f6; }
.region-badge.NA { background:#ef4444; }
.region-badge.SA { background:#db2777; }
.region-badge.AU { background:#fbbf24; }

.modal-bg { background: rgba(0,0,0,0.7); position:fixed; inset:0; display:flex; justify-content:center; align-items:center; z-index:50; }
.modal { background:#1f2937; padding:20px; border-radius:12px; max-width:400px; width:90%; }
.modal-close { cursor:pointer; float:right; font-weight:bold; }
.gold { background: linear-gradient(135deg, #ffd700, #ffec70); color:#000 !important; }
.silver { background: linear-gradient(135deg, #c0c0c0, #e0e0e0); color:#000 !important; }
.bronze { background: linear-gradient(135deg, #cd7f32, #e6a374); color:#000 !important; }
.medal-icon { margin-right:8px; }

/* Rank Styles - Based on Points System */
.rank {
  font-weight:700;
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding: 2px 10px;
  border-radius: 20px;
  font-size: 0.75rem;
  background: rgba(0,0,0,0.5);
}
.rank.master { 
  background: linear-gradient(135deg, #ffd966, #ffaa33);
  color: #2c1a00;
  box-shadow: 0 0 8px #ffaa33;
}
.rank.ace { 
  background: linear-gradient(135deg, #a0a0ff, #6c6cff);
  color: white;
  box-shadow: 0 0 6px #6c6cff;
}
.rank.specialist { 
  background: linear-gradient(135deg, #6ab04c, #2ecc71);
  color: #1a3a1a;
}
.rank.cadet { 
  background: linear-gradient(135deg, #3498db, #2980b9);
  color: white;
}
.rank.novice { 
  background: linear-gradient(135deg, #9b59b6, #8e44ad);
  color: white;
}
.rank.rookie { 
  background: linear-gradient(135deg, #95a5a6, #7f8c8d);
  color: white;
}
.rank.grandmaster { 
  background: linear-gradient(135deg, #eab308, #facc15);
  color: #1e1a00;
  text-shadow: 0 0 4px gold;
  box-shadow: 0 0 12px #facc15;
}

/* Larger rank badge styling for overall tab */
.rank-large {
  font-size: 1rem !important;
  padding: 0.35rem 1rem !important;
  gap: 8px;
  border-radius: 32px;
}

/* Inline image styling for role symbols */
.rank img {
  width: 1.2rem;
  height: 1.2rem;
  object-fit: contain;
  vertical-align: middle;
  margin: 0 2px;
}

/* Mode icons styles */
.mode-icons {
  display: flex;
  gap: 12px;
  margin-top: 6px;
  flex-wrap: wrap;
}
.mode-icon-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  width: 48px;
}
.mode-icon {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 2px solid #333;
  object-fit: contain;
  background: #111;
}
.mode-tier {
  font-size: 10px;
  font-weight: 700;
  padding: 1px 6px;
  border-radius: 9999px;
  text-align: center;
  min-width: 36px;
}

/* Tab image wrapper style */
.tab-icon {
  width: 32px;
  height: 32px;
  object-fit: contain;
  display: block;
  margin-bottom: 6px;
  filter: drop-shadow(0 0 2px rgba(219,62,62,0.5));
  transition: transform 0.2s;
}
.tab-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  cursor: pointer;
  transition: 0.2s;
}
.tab-item:hover .tab-icon {
  transform: scale(1.05);
}
</style>
</head>
<body>
<!-- Particle Container (enhanced particles count) -->
<div id="particles"></div>
<div class="max-w-6xl mx-auto p-6 relative z-10">
<div class="flex justify-between items-center mb-6">
  <div class="flex items-center gap-4">
    <div class="w-14 h-14 rounded-xl overflow-hidden flex items-center justify-center">
      <img src="https://image2url.com/r2/default/images/1774620885752-0a4cfd73-edc2-4172-bbad-7a6b4cfa2beb.png" class="w-full h-full object-cover">
    </div>
    <div>
      <h1 class="text-4xl font-black">Mace SubModes Tiers</h1>
      <p class="text-red-400 text-sm">Mace PvP Rankings</p>
    </div>
  </div>
  <div class="text-right flex flex-col items-end gap-2">
    <a href="https://discord.gg/qHXgUhVj" target="_blank" class="discord-btn">
      <i class="fab fa-discord"></i> Join Discord
    </a>
    <div class="text-gray-400 text-sm">Your Server</div>
    <div class="text-red-400 font-mono">mcpvp.club</div>
  </div>
</div>
<input type="text" id="search-input" placeholder="Search players...">
<div id="tabs" class="flex gap-6 mb-6 flex-wrap justify-center sm:justify-start"></div>
<h2 id="mode-title" class="text-2xl mb-6">Overall Rankings</h2>
<div id="rankings"></div>
<div id="player-modal" class="hidden modal-bg">
  <div class="modal">
    <span class="modal-close" id="modal-close">&times;</span>
    <div id="modal-content"></div>
  </div>
</div>
</div>

<script>
// === ENHANCED PARTICLE SYSTEM (MORE RED PARTICLES) ===
function createParticles() {
  const container = document.getElementById('particles');
  // Increased particle count from 80 to 150 for richer red atmosphere
  for (let i = 0; i < 150; i++) {
    const particle = document.createElement('div');
    particle.className = 'particle';
    const size = Math.random() * 5 + 2;
    particle.style.width = `${size}px`;
    particle.style.height = `${size}px`;
    particle.style.left = `${Math.random() * 100}vw`;
    particle.style.animationDuration = `${Math.random() * 18 + 12}s`;
    particle.style.animationDelay = `-${Math.random() * 25}s`;
    particle.style.opacity = Math.random() * 0.45 + 0.2; // slightly stronger glow
    particle.style.background = `#db3e3e`;
    container.appendChild(particle);
  }
}

// Game mode icons mapping (for player mode icons & tab images)
const modeIcons = {
  "LT Mace": "https://cdn.discordapp.com/emojis/1305399436708544512.webp?size=96",
  "HT Mace": "https://cdn.discordapp.com/emojis/1431240960506990592.webp?size=96",
  "Rocket Mace": "https://cdn.discordapp.com/emojis/1305399636030128178.webp?size=96",
  "Rod Mace": "https://cdn.discordapp.com/emojis/1305399563716268095.webp?size=96",
  "OG Mace": "https://cdn.discordapp.com/emojis/1305399676630994994.webp?size=96",
  "Spear Mace": "https://cdn.discordapp.com/emojis/1463390685972660288.webp?size=96"
};

// Special icon for Overall tab (provided link)
const OVERALL_ICON = "https://cdn.discordapp.com/emojis/1487324288175308971.webp?size=96";

const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR1Z8SzplonsR2NbZ20b6TazugXY4YjX3sMeIxGG_cXErabJUERRszTqoOX7RPAYQXnlfnwbQemEP7k/pub?output=csv";
const REGION_COLUMN_INDEX = 2;
const tierOrder = ["HT1","LT1","HT2","LT2","HT3","LT3","HT4","LT4","HT5","LT5"];
const tierColors = {
  HT1:"#f1c40f", LT1:"#ffa600",
  HT2:"#bdc3c7", LT2:"#95a5a6",
  HT3:"#ff8531", LT3:"#f37324",
  HT4:"#55ffff", LT4:"#aaffff",
  HT5:"#5555ff", LT5:"#AAAAFF"
};

let allRows = [], allModes = [], nameCol="", pointsCol="", regionCol="__region";
let currentSorted = []; // Store sorted list for modal rank access

// ========= POINTS-BASED ROLE FUNCTION with UPDATED SYMBOL IMAGES =========
function getRoleByPoints(points) {
  const pts = parseFloat(points);
  if (isNaN(pts)) return null;
  if (pts >= 100) {
    return {
      name: "Mace Master",
      icon: "<i class='fas fa-crown'></i>",
      className: "master",
      symbol: `<img src="https://immortalboost.com/valorant-boost/product/radiant-boost/" alt="★" style="width:1.2rem;height:1.2rem;object-fit:contain;">`
    };
  } else if (pts >= 50 && pts <= 99) {
    return {
      name: "Mace Ace",
      icon: "<i class='fas fa-shield-alt'></i>",
      className: "ace",
      symbol: `<img src="https://emoji.gg/emoji/5979-valorant-immortal-3" alt="⚡" style="width:1.2rem;height:1.2rem;object-fit:contain;">`
    };
  } else if (pts >= 25 && pts <= 49) {
    return {
      name: "Mace Specialist",
      icon: "<i class='fas fa-star'></i>",
      className: "specialist",
      symbol: `<img src="https://emoji.gg/emoji/4071-valorant-ascendant-3" alt="✨" style="width:1.2rem;height:1.2rem;object-fit:contain;">`
    };
  } else if (pts >= 10 && pts <= 24) {
    return {
      name: "Mace Cadet",
      icon: "<i class='fas fa-user-graduate'></i>",
      className: "cadet",
      symbol: `<img src="https://valorant.fandom.com/wiki/Competitive" alt="🎓" style="width:1.2rem;height:1.2rem;object-fit:contain;">`
    };
  } else if (pts >= 5 && pts <= 9) {
    return {
      name: "Mace Novice",
      icon: "<i class='fas fa-feather-alt'></i>",
      className: "novice",
      symbol: `<img src="https://www.redbubble.com/i/sticker/Gold-3-Rank-Active-by-RebecaHolton/148510378.EJUG5" alt="🌱" style="width:1.2rem;height:1.2rem;object-fit:contain;">`
    };
  } else if (pts >= 1 && pts <= 4) {
    return {
      name: "Mace Rookie",
      icon: "<i class='fas fa-baby-carriage'></i>",
      className: "rookie",
      symbol: `<img src="https://emoji.gg/emoji/3293-valorant-silver-3" alt="🍼" style="width:1.2rem;height:1.2rem;object-fit:contain;">`
    };
  }
  return null;
}

// Generate rank badge HTML based on points (standard small version)
function getRankBadge(points, isModal = false) {
  const role = getRoleByPoints(points);
  if (!role) return '';
  const styleClass = isModal ? 'text-lg px-4 py-1' : 'text-xs px-2 py-0.5';
  // For modal we keep same structure but symbol is already an image
  return `<span class="rank ${role.className} ${styleClass}">${role.icon} ${role.name} ${role.symbol}</span>`;
}

// Generate LARGE rank badge for overall tab (bigger, placed before points now)
function getLargeRankBadge(points) {
  const role = getRoleByPoints(points);
  if (!role) return '';
  return `<span class="rank ${role.className} rank-large">${role.icon} ${role.name} ${role.symbol}</span>`;
}

function parseCSV(text){
  const lines = text.split(/\r?\n/).filter(l=>l.trim());
  const headers = lines[0].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(h=>h.replace(/"/g,'').trim());
  const data = lines.slice(1).map(l=>{
    const cells = l.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c=>c.replace(/"/g,'').trim());
    const obj = {};
    headers.forEach((h,i)=>obj[h]=cells[i]||"");
    obj["__region"] = cells[REGION_COLUMN_INDEX] || "";
    return obj;
  });
  return { headers, data };
}

async function loadCSV(){
  const res = await fetch(CSV_URL);
  const text = await res.text();
  const { headers, data } = parseCSV(text);
  allRows = data;
  nameCol = headers.find(h=>/name|player/i.test(h)) || headers[0];
  pointsCol = headers.find(h=>/points/i.test(h)) || headers[1];
  allModes = ["Overall","LT Mace","HT Mace","Rocket Mace","OG Mace","Rod Mace","Spear Mace"];
 
  // Build tabs with icons ABOVE each button
  const tabsDiv = document.getElementById("tabs");
  tabsDiv.innerHTML = "";
  
  allModes.forEach((mode, idx) => {
    const tabWrapper = document.createElement("div");
    tabWrapper.className = "tab-item";
    
    // Choose icon: Overall uses special link, others from modeIcons mapping
    let iconUrl = "";
    if (mode === "Overall") {
      iconUrl = OVERALL_ICON;
    } else {
      iconUrl = modeIcons[mode] || "";
    }
    
    const img = document.createElement("img");
    img.src = iconUrl;
    img.alt = mode;
    img.className = "tab-icon";
    img.style.width = "36px";
    img.style.height = "36px";
    img.style.borderRadius = "8px";
    
    const btn = document.createElement("button");
    btn.textContent = mode;
    btn.className = "tab px-4 py-2 bg-gray-800 rounded-xl";
    if(idx === 0) btn.classList.add("tab-active");
    btn.onclick = (e) => {
      e.stopPropagation();
      loadMode(mode, btn);
    };
    
    tabWrapper.appendChild(img);
    tabWrapper.appendChild(btn);
    // Also allow clicking the whole wrapper to trigger tab
    tabWrapper.addEventListener("click", (e) => {
      if(e.target !== btn) btn.click();
    });
    tabsDiv.appendChild(tabWrapper);
  });
  
  loadMode("Overall", document.querySelector("#tabs .tab-active"));
}

function getModeIconsHTML(player) {
  let html = '<div class="mode-icons">';
  const orderedModes = ["LT Mace", "HT Mace", "Rocket Mace", "Rod Mace", "OG Mace", "Spear Mace"];
 
  orderedModes.forEach(mode => {
    const tier = (player[mode] || "").toUpperCase().trim();
    if (!tier) return;
   
    const iconUrl = modeIcons[mode];
    const color = tierColors[tier] || "#666";
   
    html += `
      <div class="mode-icon-container">
        <img src="${iconUrl}" class="mode-icon" style="border-color: ${color};">
        <div class="mode-tier" style="background:${color}; color:#000;">${tier}</div>
      </div>
    `;
  });
 
  html += '</div>';
  return html;
}

function loadMode(mode, activeBtn){
  document.querySelectorAll("#tabs .tab").forEach(b=>b.classList.remove("tab-active"));
  activeBtn.classList.add("tab-active");
  document.getElementById("mode-title").textContent = mode+" Rankings";
 
  let htmlOut = "";

  if(mode === "Overall"){
    // SORT BY POINTS (highest first)
    currentSorted = [...allRows].sort((a,b)=>parseFloat(b[pointsCol]||0)-parseFloat(a[pointsCol]||0));
    
    currentSorted.forEach((r, idx)=>{
      const name = r[nameCol];
      if(!name) return;
      const pointsVal = parseFloat(r[pointsCol]||0);
      const avatar = `https://mc-heads.net/avatar/${encodeURIComponent(name)}/64`;
      const region = r[regionCol];
     
      let medalClass = "", medalIcon = "";
      if(idx===0){ medalClass="gold"; medalIcon="<i class='fas fa-medal medal-icon'></i>"; }
      else if(idx===1){ medalClass="silver"; medalIcon="<i class='fas fa-medal medal-icon'></i>"; }
      else if(idx===2){ medalClass="bronze"; medalIcon="<i class='fas fa-medal medal-icon'></i>"; }

      // Points-based role: large badge (placed BEFORE points)
      const largeRankBadge = getLargeRankBadge(pointsVal);
      
      // Extra grandmaster flair for #1 with high points
      let extraGrandHtml = "";
      if(idx === 0 && pointsVal >= 100) {
        extraGrandHtml = `<span class="rank grandmaster rank-large ml-2"><i class="fas fa-crown"></i> #1 Grand Champion</span>`;
      }

      let regionHTML = "";
      if (region) {
        let regionClass = "";
        const reg = region.toUpperCase().trim();
        if (reg === "EU") regionClass = "EU";
        else if (reg === "AS") regionClass = "AS";
        else if (reg === "NA") regionClass = "NA";
        else if (reg === "SA") regionClass = "SA";
        else if (reg === "AU") regionClass = "AU";
        regionHTML = `<span class="region-badge ${regionClass}">${region}</span>`;
      }

      // RIGHT SIDE: ROLE BADGE FIRST, then points with "pts" label, then extra grand champion.
      const rightSideContent = `
        <div class="flex items-center gap-4 relative z-10 flex-shrink-0 flex-wrap justify-end">
          ${largeRankBadge}
          <div class="font-mono text-xl font-bold text-red-400 flex items-center gap-1">
            ${r[pointsCol]} <span class="text-sm text-gray-300 font-medium">pts</span>
          </div>
          ${extraGrandHtml}
        </div>
      `;

      htmlOut += `
      <div class="player-card relative overflow-hidden ${medalClass}" data-player='${JSON.stringify(r).replace(/'/g, "&apos;")}' data-index="${idx}" data-points="${pointsVal}">
        ${idx < 3 ? `
        <div class="absolute inset-0 pointer-events-none"
             style="background: linear-gradient(135deg, rgba(255,215,0,0.25) 0%, rgba(192,192,192,0.2) 40%, rgba(205,127,50,0.2) 60%, rgba(0,0,0,0) 75%); clip-path: polygon(0 0, 70% 0, 55% 100%, 0% 100%);">
        </div>
        ` : ""}
       
        <img src="${avatar}" class="player-img">
       
        <div class="flex-1 flex flex-col justify-center min-w-0">
          <div class="flex items-center flex-wrap gap-x-2 gap-y-1">
            ${medalIcon}<span class="font-bold">${idx+1}.</span> ${name}
            ${regionHTML}
          </div>
          ${getModeIconsHTML(r)}
        </div>
       
        ${rightSideContent}
      </div>`;
    });
  } else {
    // Other tabs: LT Mace, HT Mace etc — original tiered layout (no badge repositioning, untouched)
    const groups = {};
    allRows.forEach(r=>{
      const name = r[nameCol];
      if(!name) return;
      const tier = (r[mode]||"").toUpperCase();
      if(!tier) return;
      if(!groups[tier]) groups[tier]=[];
      groups[tier].push(r);
    });
   
    tierOrder.forEach(tier=>{
      if(!groups[tier]) return;
      htmlOut += `<div class="mb-6">
        <div class="tier-header" style="background:${tierColors[tier]}">${tier}</div>`;
      groups[tier].forEach(r=>{
        const name = r[nameCol];
        const avatar = `https://mc-heads.net/avatar/${encodeURIComponent(name)}/64`;
        const region = r[regionCol];
        const pointsVal = parseFloat(r[pointsCol]||0);
        const rankBadgeSmall = getRankBadge(pointsVal, false);
       
        let regionHTML = "";
        if (region) {
          let regionClass = "";
          const reg = region.toUpperCase().trim();
          if (reg === "EU") regionClass = "EU";
          else if (reg === "AS") regionClass = "AS";
          else if (reg === "NA") regionClass = "NA";
          else if (reg === "SA") regionClass = "SA";
          else if (reg === "AU") regionClass = "AU";
          regionHTML = `<span class="region-badge ${regionClass}">${region}</span>`;
        }
       
        htmlOut += `
        <div class="player-card" data-player='${JSON.stringify(r).replace(/'/g, "&apos;")}' data-points="${pointsVal}">
          <img src="${avatar}" class="player-img">
          <div class="flex items-center gap-2 flex-wrap flex-1">
            <span class="font-semibold">${name}</span>
            ${regionHTML}
            ${rankBadgeSmall}
          </div>
          <div class="ml-auto font-mono text-sm">${r[pointsCol] || 0} pts</div>
        </div>`;
      });
      htmlOut += `</div>`;
    });
  }
  
  document.getElementById("rankings").innerHTML = htmlOut;

  // Helper function to compute overall rank for any player
  function getOverallRank(playerObj) {
    const sorted = [...allRows].sort((a,b) => parseFloat(b[pointsCol]||0) - parseFloat(a[pointsCol]||0));
    const playerName = playerObj[nameCol];
    const playerPoints = parseFloat(playerObj[pointsCol]||0);
    const idx = sorted.findIndex(p => p[nameCol] === playerName && parseFloat(p[pointsCol]||0) === playerPoints);
    return idx !== -1 ? idx + 1 : null;
  }

  // Attach click handlers for modal (region & role fully displayed)
  document.querySelectorAll(".player-card").forEach(card=>{
    card.onclick = () => {
      const playerData = JSON.parse(card.dataset.player.replace(/&apos;/g, "'"));
      const avatar = `https://mc-heads.net/avatar/${encodeURIComponent(playerData[nameCol])}/128`;
      const region = playerData[regionCol];
      const pointsVal = parseFloat(playerData[pointsCol] || 0);
      
      const overallRank = getOverallRank(playerData);
      
      const role = getRoleByPoints(pointsVal);
      let roleModalHTML = '';
      if(role) {
        roleModalHTML = `
          <div class="flex justify-center mt-3">
            <div class="rank ${role.className} text-xl px-5 py-2 rounded-full inline-flex items-center gap-2">
              ${role.icon} ${role.name} ${role.symbol}
            </div>
          </div>
        `;
      }
      
      let extraGrand = '';
      if(pointsVal >= 100) {
        extraGrand = `<div class="text-center text-amber-400 text-sm mt-1"><i class="fas fa-bolt"></i> Elite Mace Warrior</div>`;
      }
      
      let modalHTML = `<div class="flex justify-center mb-4"><img src="${avatar}" style="width:128px;height:128px;border-radius:50%;border:3px solid #db3e3e;"></div>`;
      
      let regionInline = '';
      if(region) {
        let regionClass = "";
        const reg = region.toUpperCase().trim();
        if (reg === "EU") regionClass = "EU";
        else if (reg === "AS") regionClass = "AS";
        else if (reg === "NA") regionClass = "NA";
        else if (reg === "SA") regionClass = "SA";
        else if (reg === "AU") regionClass = "AU";
        regionInline = `<span class="region-badge ${regionClass} ml-2 align-middle">${region}</span>`;
      }
      
      modalHTML += `<h2 class="text-2xl font-bold text-center">${playerData[nameCol]} ${regionInline}</h2>`;
      modalHTML += roleModalHTML;
      modalHTML += extraGrand;
      modalHTML += `<div class="mt-6">${getModeIconsHTML(playerData)}</div>`;
      
      if (overallRank !== null) {
        modalHTML += `<div class="text-center mt-4 pt-2">
          <span class="text-gray-400">Overall Position:</span>
          <span class="text-lg font-bold text-yellow-400">#${overallRank}</span>
        </div>`;
      }
      
      modalHTML += `<div class="text-center mt-2 pt-2 border-t border-gray-600">
        <span class="text-gray-400">Overall Points:</span>
        <span class="text-xl font-bold text-red-400">${playerData[pointsCol]}</span>
      </div>`;
      
      if(pointsVal >= 100) {
        modalHTML += `<div class="text-center text-yellow-300 text-sm mt-2"><i class="fas fa-crown"></i> Mace Master - Top Tier Dominator</div>`;
      } else if(pointsVal >= 50) {
        modalHTML += `<div class="text-center text-blue-300 text-sm mt-2"><i class="fas fa-shield-alt"></i> Mace Ace - Elite Combatant</div>`;
      } else if(pointsVal >= 25) {
        modalHTML += `<div class="text-center text-green-300 text-sm mt-2"><i class="fas fa-star"></i> Mace Specialist - Proven Warrior</div>`;
      } else if(pointsVal >= 10) {
        modalHTML += `<div class="text-center text-cyan-300 text-sm mt-2"><i class="fas fa-user-graduate"></i> Mace Cadet - Rising Talent</div>`;
      } else if(pointsVal >= 5) {
        modalHTML += `<div class="text-center text-purple-300 text-sm mt-2"><i class="fas fa-feather-alt"></i> Mace Novice - Learning the Craft</div>`;
      } else if(pointsVal >= 1) {
        modalHTML += `<div class="text-center text-gray-400 text-sm mt-2"><i class="fas fa-baby-carriage"></i> Mace Rookie - Fresh Recruit</div>`;
      }

      document.getElementById("modal-content").innerHTML = modalHTML;
      document.getElementById("player-modal").classList.remove("hidden");
    };
  });
}

document.getElementById("search-input").addEventListener("input", e=>{
  const term = e.target.value.toLowerCase();
  document.querySelectorAll(".player-card").forEach(card=>{
    const text = card.textContent.toLowerCase();
    card.style.display = text.includes(term) ? "flex" : "none";
  });
});

document.getElementById("modal-close").onclick = ()=>{
  document.getElementById("player-modal").classList.add("hidden");
};

// Initialize
window.onload = () => {
  createParticles();  // enhanced particles (150, redder)
  loadCSV();
  setInterval(loadCSV, 30000);
};
</script>
</body>
</html>
