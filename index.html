<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mace SubModes Tiers • Rankings</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  body { background: #0a0a0a; color: #e5e5e5; font-family: system-ui, sans-serif; }
  .tab { transition: all 0.2s; }
  .tab-active { background-color: #db3e3e; color: black; font-weight: 700; box-shadow: 0 0 20px rgba(219,62,62,0.6); }
  .tier-header { font-size: 1.8rem; font-weight: 800; letter-spacing: -0.04em; padding: 0.5rem 1.5rem; border-radius: 9999px; }
  .player-card { transition: all 0.25s ease; background-color: #1f2937; padding: 0.75rem 1rem; border-radius: 1rem; display:flex; align-items:center; gap:1rem; }
  .player-card:hover { transform: translateY(-4px); box-shadow: 0 10px 25px rgba(219,62,62,0.4); }
  .player-img { width: 48px; height:48px; border-radius:9999px; border:2px solid #db3e3e; }
  .rank { font-family: monospace; font-weight: bold; color:#db3e3e; margin-right:0.5rem; }
  .discord-btn { 
    display: inline-block; 
    background-color: #7289da; 
    color: white; 
    font-weight: 600; 
    padding: 0.25rem 0.75rem; 
    border-radius: 0.5rem; 
    text-decoration: none; 
    transition: all 0.2s;
  }
  .discord-btn:hover { background-color: #5b6eae; }
</style>
</head>
<body class="min-h-screen pb-12">
<div class="max-w-7xl mx-auto px-6 py-8">

  <!-- Header -->
  <div class="flex flex-col md:flex-row items-center justify-between mb-10 gap-4">
    <div class="flex items-center gap-4">
      <div class="w-14 h-14 bg-[#db3e3e] rounded-2xl flex items-center justify-center text-4xl font-black text-black">M</div>
      <div>
        <h1 class="text-5xl font-black tracking-tighter">Mace SubModes Tiers</h1>
        <p class="text-[#db3e3e] text-sm -mt-1">Mace PvP Rankings</p>
      </div>
    </div>
    <div class="text-right text-sm flex flex-col items-end gap-2">
      <a href="https://discord.gg/qHXgUhVj" target="_blank" class="discord-btn"><i class="fab fa-discord mr-1"></i>Join Discord</a>
      <div class="text-gray-400">Your Server</div>
      <div class="font-mono text-[#db3e3e]">mcpvp.club</div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="flex flex-wrap gap-3 mb-12 border-b border-gray-800 pb-6" id="tabs"></div>

  <h2 id="mode-title" class="text-4xl font-bold mb-8">Overall Rankings</h2>
  <div id="rankings" class="space-y-6"></div>
</div>

<script>
const GOOGLE_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRKHryT8GKlMBjSowNQqBYdtVYVUMXOA12q1e9upH901YAfdi2sP2E5xU-VXqY-fFh__dRdIwvKM_Or/pubhtml";

// Define modes
const modes = ["Overall", "LT Mace", "HT Mace", "Rocket Mace", "OG Mace", "Rod Mace", "Spear Mace"];

// Define custom tier order
const tierOrder = ["HT1","LT1","HT2","LT2","HT3","LT3","HT4","LT4","HT5","LT5"];

// Define colors per tier
const tierColors = {
  "HT1": "#ff5555",
  "LT1": "#ff9999",
  "HT2": "#ffaa00",
  "LT2": "#ffcc66",
  "HT3": "#55ff55",
  "LT3": "#99ff99",
  "HT4": "#55ffff",
  "LT4": "#99ffff",
  "HT5": "#5555ff",
  "LT5": "#9999ff"
};

// Create tabs
const tabsDiv = document.getElementById("tabs");
modes.forEach((mode,i)=>{
  const btn = document.createElement("button");
  btn.textContent = mode;
  btn.className = `tab px-6 py-3 rounded-2xl text-lg ${i===0?'tab-active':'bg-gray-900 hover:bg-gray-800'}`;
  btn.onclick = ()=>loadMode(mode, btn);
  tabsDiv.appendChild(btn);
});

async function loadMode(mode, activeBtn){
  document.querySelectorAll('#tabs button').forEach(b=>b.classList.remove('tab-active'));
  activeBtn.classList.add('tab-active');
  document.getElementById("mode-title").textContent = mode+" Rankings";

  try{
    const res = await fetch(GOOGLE_CSV_URL);
    const text = await res.text();
    const rows = text.split("\n").slice(1).map(r=>r.split(",").map(c=>c.trim().replace(/^"|"$/g,'')));
    let html = "";

    if(mode==="Overall"){
      // Compute total points
      const scores = {};
      rows.forEach(row=>{
        if(!row[0]) return;
        const name=row[0];
        let total=0;
        for(let i=1;i<=6;i++){
          const tier=parseInt(row[i])||5;
          total+=Math.max(60-tier*10,10);
        }
        scores[name]={total, tiers: row.slice(1,7)};
      });
      const sorted = Object.entries(scores).sort((a,b)=>b[1].total - a[1].total).slice(0,100);
      html += `<div class="space-y-4">`;
      sorted.forEach(([name,data])=>{
        const avatar = `https://mc-heads.net/avatar/${encodeURIComponent(name)}/64`;
        html += `<div class="player-card">
                  <img src="${avatar}" alt="${name}" class="player-img">
                  <div class="flex-1 font-semibold">${name}</div>
                  <div class="text-right font-mono text-[#db3e3e]">${data.total} pts</div>
                 </div>`;
      });
      html += `</div>`;
    } else {
      // Single gamemode
      const index = modes.indexOf(mode)-1;
      const tierGroups = {};
      rows.forEach(row=>{
        if(!row[0]) return;
        const name = row[0];
        const tier = row[index+1] || "LT5";
        if(!tierGroups[tier]) tierGroups[tier]=[];
        tierGroups[tier].push(name);
      });

      tierOrder.forEach(tier=>{
        if(!tierGroups[tier]) return;
        const color = tierColors[tier] || "#888888";
        html += `<div class="space-y-2">
                  <div class="tier-header mb-3 p-3" style="background-color:${color}">${tier}</div>`;
        tierGroups[tier].forEach(name=>{
          const avatar = `https://mc-heads.net/avatar/${encodeURIComponent(name)}/64`;
          html += `<div class="player-card">
                     <img src="${avatar}" alt="${name}" class="player-img">
                     <div class="flex-1 font-semibold">${name}</div>
                     <div></div>
                   </div>`;
        });
        html += `</div>`;
      });
    }

    document.getElementById("rankings").innerHTML = html || "<p class='text-center text-gray-500 py-20'>No data yet...</p>";

  } catch(e){
    document.getElementById("rankings").innerHTML = "<p class='text-red-400 text-center py-20'>Failed to load data.<br>Check your CSV URL.</p>";
  }
}

// Load default
window.onload=()=>loadMode("Overall",document.querySelector('#tabs button'));

// Auto refresh every 30s
setInterval(()=>{
  const active = document.querySelector('.tab-active');
  if(active) loadMode(active.textContent,active);
},30000);
</script>
</body>
</html>
