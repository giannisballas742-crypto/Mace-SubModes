<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mace SubModes Tiers • Rankings</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
body { background:#0a0a0a; color:#e5e5e5; font-family:system-ui; }
.tab { transition:0.2s; cursor:pointer; }
.tab-active { background:#db3e3e; color:black; font-weight:700; box-shadow:0 0 20px rgba(219,62,62,0.6); }
.player-card { background:#1f2937; padding:10px; border-radius:12px; display:flex; align-items:center; gap:10px; margin-bottom:8px; }
.player-card:hover { transform:translateY(-3px); box-shadow:0 10px 20px rgba(219,62,62,0.4); }
.player-img { width:40px; height:40px; border-radius:50%; border:2px solid #db3e3e; }
.tier-header { font-weight:800; padding:8px 16px; border-radius:999px; margin-bottom:10px; }
.discord-btn { background:#7289da; padding:5px 12px; border-radius:8px; }
#search { width:100%; max-width:300px; padding:6px 12px; border-radius:8px; margin-bottom:16px; background:#1f2937; color:white; border:none; }
#search::placeholder { color:#aaa; }
</style>
</head>

<body>
<div class="max-w-6xl mx-auto p-6">

<!-- HEADER -->
<div class="flex justify-between items-center mb-10">
  <div class="flex items-center gap-4">
    <div class="w-14 h-14 bg-red-500 rounded-xl flex items-center justify-center text-black text-3xl font-bold">M</div>
    <div>
      <h1 class="text-4xl font-black">Mace SubModes Tiers</h1>
      <p class="text-red-400 text-sm">Mace PvP Rankings</p>
    </div>
  </div>

  <div class="text-right flex flex-col items-end gap-2">
    <a href="https://discord.gg/qHXgUhVj" target="_blank" class="discord-btn">
      <i class="fab fa-discord"></i> Join Discord
    </a>
    <div class="text-gray-400 text-sm">Your Server</div>
    <div class="text-red-400 font-mono">mcpvp.club</div>
  </div>
</div>

<!-- TABS -->
<div id="tabs" class="flex gap-3 mb-4"></div>

<!-- SEARCH -->
<input type="text" id="search" placeholder="Search player..." oninput="filterPlayers()">

<h2 id="mode-title" class="text-2xl mb-6">Overall Rankings</h2>
<div id="rankings"></div>

</div>

<script>
// --- CONFIG ---
const SHEET_ID = "1xq36n4BEkxd142pCQ0g8rMHMr0dj_u46XiSCMKvCL8I";
const SHEET_NAME = "Mace SubModes Tierlist";
const modes = ["Overall","LT Mace","HT Mace","Rocket Mace","OG Mace","Rod Mace","Spear Mace"];
const tierOrder = ["HT1","LT1","HT2","LT2","HT3","LT3","HT4","LT4","HT5","LT5"];
const tierColors = {
HT1:"#ff4d4d", LT1:"#ff9999",
HT2:"#ffaa00", LT2:"#ffd27f",
HT3:"#55ff55", LT3:"#aaffaa",
HT4:"#55ffff", LT4:"#aaffff",
HT5:"#5555ff", LT5:"#aaaaff"
};

// --- CREATE TABS ---
const tabsDiv = document.getElementById("tabs");
modes.forEach((mode,i)=>{
  const btn = document.createElement("button");
  btn.textContent = mode;
  btn.className = "tab px-4 py-2 bg-gray-800 rounded-xl";
  if(i===0) btn.classList.add("tab-active");
  btn.onclick = ()=>loadMode(mode,btn);
  tabsDiv.appendChild(btn);
});

// --- FETCH SHEET DATA ---
let sheetData = [];
async function fetchSheet(){
  try{
    const res = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`);
    const text = await res.text();
    const jsonText = text.match(/.*?({.*});/s)[1];
    const json = JSON.parse(jsonText);
    const rows = json.table.rows.map(r=>r.c.map(c=>c?c.v:""));
    rows.shift(); // remove header
    sheetData = rows;
  }catch(e){
    console.error("Failed to fetch sheet:",e);
    document.getElementById("rankings").innerHTML = "<p class='text-red-400 py-20'>Failed to load data</p>";
  }
}

// --- LOAD MODE ---
function loadMode(mode,btn){
  document.querySelectorAll("#tabs button").forEach(b=>b.classList.remove("tab-active"));
  btn.classList.add("tab-active");
  document.getElementById("mode-title").textContent = mode+" Rankings";

  if(!sheetData.length){
    document.getElementById("rankings").innerHTML = "<p class='text-gray-500 py-20'>Loading...</p>";
    return;
  }

  let htmlOut = "";

  if(mode==="Overall"){
    const scores = {};
    sheetData.forEach(r=>{
      const name = r[0].trim();
      if(!name) return;
      let score = 0;
      for(let i=1;i<modes.length;i++){
        const tier = (r[i] || "LT5").toUpperCase();
        const index = tierOrder.indexOf(tier);
        if(index!==-1) score += (10 - index);
      }
      scores[name] = score;
    });
    const sorted = Object.entries(scores).sort((a,b)=>b[1]-a[1]);
    sorted.forEach(([name,score],i)=>{
      const avatar = `https://mc-heads.net/avatar/${encodeURIComponent(name)}/64`;
      htmlOut += `<div class="player-card" data-name="${name.toLowerCase()}">
        <img src="${avatar}" class="player-img">
        <div class="flex-1">${i+1}. ${name}</div>
        <div>${score}</div>
      </div>`;
    });
  } else {
    const modeIndex = modes.indexOf(mode);
    const groups = {};
    sheetData.forEach(r=>{
      const name = r[0].trim();
      if(!name) return;
      const tier = (r[modeIndex] || "LT5").toUpperCase();
      if(!groups[tier]) groups[tier] = [];
      groups[tier].push(name);
    });
    tierOrder.forEach(tier=>{
      if(!groups[tier]) return;
      htmlOut += `<div class="mb-6 tier-group" data-tier="${tier}"><div class="tier-header" style="background:${tierColors[tier]}">${tier}</div>`;
      groups[tier].forEach(name=>{
        const avatar = `https://mc-heads.net/avatar/${encodeURIComponent(name)}/64`;
        htmlOut += `<div class="player-card" data-name="${name.toLowerCase()}">
          <img src="${avatar}" class="player-img">
          <div>${name}</div>
        </div>`;
      });
      htmlOut += `</div>`;
    });
  }

  document.getElementById("rankings").innerHTML = htmlOut || "<p class='text-gray-500 py-20'>No data yet...</p>";
  filterPlayers(); // apply search immediately
}

// --- SEARCH FILTER ---
function filterPlayers(){
  const query = document.getElementById("search").value.toLowerCase();
  document.querySelectorAll(".player-card").forEach(card=>{
    const name = card.dataset.name;
    card.style.display = name.includes(query) ? "flex" : "none";
  });
}

// --- INIT ---
window.onload = async ()=>{
  await fetchSheet();
  loadMode("Overall",document.querySelector("#tabs button"));
};

// --- AUTO REFRESH ---
setInterval(async ()=>{
  await fetchSheet();
  const active = document.querySelector(".tab-active");
  if(active) loadMode(active.textContent,active);
},30000);
</script>
</body>
</html>
