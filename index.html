<!DOCTYPE html>
<html lang="en">
<head>

<title>Mace SubModes Tiers • Rankings</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
body {
  background: #0a0a0a;
  color:#e5e5e5;
  font-family:system-ui;
  overflow-x: hidden;
  position: relative;
}
#particles {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
  pointer-events: none;
  background: radial-gradient(circle at center, rgba(219, 62, 62, 0.22) 0%, rgba(219, 62, 62, 0.05) 40%, transparent 80%);
}
body::before {
  content: '';
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: radial-gradient(ellipse at 20% 50%, rgba(219,62,62,0.12) 0%, transparent 60%),
              radial-gradient(ellipse at 90% 40%, rgba(219,62,62,0.12) 0%, transparent 60%);
  pointer-events: none;
  z-index: -1;
}
.particle {
  position: absolute;
  background: #db3e3e;
  border-radius: 50%;
  opacity: 0.35;
  animation: floatParticle linear infinite;
  box-shadow: 0 0 10px #db3e3e;
}
@keyframes floatParticle {
  0% { transform: translateY(100vh) scale(0.4); opacity: 0; }
  12% { opacity: 0.4; }
  88% { opacity: 0.4; }
  100% { transform: translateY(-100px) scale(1); opacity: 0; }
}
.tab { transition:0.2s; cursor:pointer; }
.tab-active { background:#db3e3e; color:black; font-weight:700; box-shadow:0 0 20px rgba(219,62,62,0.6); }
.player-card { background:#1f2937; padding:10px; border-radius:12px; display:flex; align-items:center; gap:12px; margin-bottom:8px; transition:0.2s; cursor:pointer; }
.player-card:hover { transform:translateY(-3px); box-shadow:0 10px 20px rgba(219,62,62,0.4); }
.player-img { width:48px; height:48px; border-radius:50%; border:2px solid #db3e3e; flex-shrink:0; }
.tier-header {
  font-weight:800;
  padding:8px 16px;
  border-radius:999px;
  margin-bottom:10px;
  display:inline-block;
  cursor:help;
  position: relative;
}
.tier-header[data-tooltip]::after {
  content: attr(data-tooltip);
  position: absolute;
  bottom: 120%;
  left: 50%;
  transform: translateX(-50%);
  background: #111;
  color: #ffcc88;
  padding: 6px 12px;
  border-radius: 8px;

}
.tier-header[data-tooltip]:hover::after {
  opacity: 1;
}
.mode-tier {
  position: relative;
  cursor: help;
}
.mode-tier[data-tooltip]::after {
  content: attr(data-tooltip);

<script>
// Particles

    p.style.height = `${s}px`;

    p.style.animationDuration = `${Math.random() * 18 + 12}s`;
    p.style.animationDelay = `-${Math.random() * 25}s`;
    p.style.opacity = Math.random() * 0.45 + 0.2;
    p.style.background = `#db3e3e`;
    container.appendChild(p);
  }
}

// Kit Info Database (unchanged)

  "OG Mace": { title: "OG Mace Kit", items: [ "Netherite Helmet [Protection IV, Unbreaking III, Mending]", "Netherite Chestplate [Protection IV, Unbreaking III, Mending]", "Netherite Leggings [Protection IV, Unbreaking III, Mending]", "Netherite Boots [Protection IV, Unbreaking III, Mending, Feather Falling IV]", "Netherite Sword [Sharpness V, Unbreaking III, Mending]", "Mace [Density V, Wind Burst I, Unbreaking III, Mending]", "1x Totem of Undying", "1 Stack of Golden Apples", "5 Stacks of Wind Charges", "4 Stacks of Ender Pearls", "1 Stack of XP Bottles", "10x Splash Potions of Strength II [1:30]", "10x Splash Potions of Leaping II [1:30]", "3x Splash Potions of Speed I [8:00]" ], image: "https://i.postimg.cc/G4kCQrrs/OG-mace.png" },
  "Rod Mace": { title: "Rod Mace Kit", items: [ "Diamond Helmet [Protection IV, Unbreaking III]", "Diamond Chestplate [Protection IV, Unbreaking III]", "Diamond Leggings [Protection IV, Unbreaking III]", "Diamond Boots [Protection IV, Unbreaking III, Feather Falling IV]", "Diamond Axe [Efficiency V, Unbreaking III, Mending]", "Mace [Density V, Wind Burst II, Unbreaking III, Mending]", "Shield [Unbreaking III, Mending]", "Fishing Rod [Unbreaking III, Mending]", "Crossbow [Quick Charge III, Unbreaking III]", "16x Arrows", "3x Boats", "4x Totem of Undying", "1 Stack of Golden Apples", "16x Doors", "16x Slime Blocks", "32x XP Bottles", "20x Splash Potions of Leaping II [1:30]" ], image: "https://i.postimg.cc/hX9BrggJ/rod-mace.png" },
  "Spear Mace": { title: "Spear Mace Kit", items: [ "Netherite Armor [Protection 4, Feather Falling 4 on Boots]", "Netherite Axe [Unbreaking III]", "Mace [Density V, Windburst II]", "Spear [Lunge III, Sharpness V, Unbreaking III]", "Shield [Unbreaking 3]", "32x Ender Pearls", "32x Golden Apples", "12x Splash Potion of Strength II [1:30]", "12x Splash Potion of Speed II [1:30]", "128x Wind Charges", "3x Totems Of Undying", "64x Steak" ], image: "https://i.postimg.cc/cvQSmZZf/spear-mace.png" }
};
function showKitInfo(mode) {
  const info = kitInfoMap[mode];
  if (!info) return;
  const iconUrl = modeIcons[mode] || "";
  const iconHtml = iconUrl ? `<img src="${iconUrl}" style="width:40px;height:40px;border-radius:8px;margin-right:10px;">` : "";
  let itemsHtml = '<ul class="list-disc pl-5 space-y-1 max-h-80 overflow-y-auto text-left">';
  info.items.forEach(i => itemsHtml += `<li class="text-sm">${i}</li>`);
  itemsHtml += '</ul>';
  const kitImageHtml = `<div class="mt-4"><img src="${info.image}" class="max-w-full h-auto rounded-lg border border-gray-600 mx-auto" style="max-height:200px;object-fit:contain;" onerror="this.onerror=null;this.src='https://placehold.co/400x200?text=Image+Not+Available';"><p class="text-gray-400 text-xs text-center mt-1">Kit preview</p></div>`;
  const modalHtml = `<div class="text-center"><div class="flex items-center justify-center gap-2 mb-3">${iconHtml}<h3 class="text-xl font-bold">${info.title}</h3></div><div class="bg-black/30 p-3 rounded-lg mt-2">${itemsHtml}</div>${kitImageHtml}<p class="text-gray-400 text-xs mt-3">Kit details for ${mode}</p></div>`;
  document.getElementById("modal-content").innerHTML = modalHtml;
  document.getElementById("player-modal").classList.remove("hidden");
}

// ========== ENHANCED TIER PARSING (Handles prefixed tiers like RHT2, RLT1, etc.) ==========
const tierPointsMap = { "HT1":60,"LT1":45,"HT2":30,"LT2":20,"HT3":10,"LT3":6,"HT4":4,"LT4":3,"HT5":2,"LT5":1 };
const tierOrder = ["HT1","LT1","HT2","LT2","HT3","LT3","HT4","LT4","HT5","LT5"];
const tierColors = { HT1:"#f1c40f", LT1:"#ffa600", HT2:"#bdc3c7", LT2:"#95a5a6", HT3:"#ff8531", LT3:"#f37324", HT4:"#55ffff", LT4:"#aaffff", HT5:"#5555ff", LT5:"#AAAAFF" };

// Helper: extract base standard tier (e.g., "HT2" from "RHT2", "RLT1" -> "LT1")
function extractBaseTierFromCode(tierCode) {
  // match any prefix (letters, maybe numbers) followed by a standard tier (HT1..HT5, LT1..LT5)
  const match = tierCode.match(/(HT[1-5]|LT[1-5])/i);
  if (match) return match[1].toUpperCase();
  return null;
}

function parseTierString(tierStr) {
  if (!tierStr) return null;
  const upper = tierStr.toUpperCase().trim();
  // Check for peak pattern: something like "RHT2 (PEAK HT2)" or "HT2 (PEAK HT2)"
  const peakMatch = upper.match(/^(.*?)\s*\(\s*PEAK\s+(HT[1-5]|LT[1-5])\s*\)$/i);
  if (peakMatch) {
    const rawDisplay = peakMatch[1].trim();
    const peakTier = peakMatch[2].toUpperCase();
    // Determine base tier from rawDisplay (might have prefix)
    const baseTier = extractBaseTierFromCode(rawDisplay);
    if (!baseTier) return null;
    return {
      display: rawDisplay,   // e.g., "RHT2"
      baseTier: baseTier,    // e.g., "HT2"
      peakTier: peakTier
    };
  }
  // No peak: just a tier string (could have prefix)
  const baseTier = extractBaseTierFromCode(upper);
  if (!baseTier) return null;
  return {
    display: upper,          // e.g., "RHT2"
    baseTier: baseTier,      // e.g., "HT2"
    peakTier: null
  };
}

function extractBaseTier(rawTier) {
  const parsed = parseTierString(rawTier);
  return parsed ? parsed.baseTier : null;
}

// Globals
const modeIcons = { "LT Mace":"https://cdn.discordapp.com/emojis/1305399436708544512.webp?size=96","HT Mace":"https://cdn.discordapp.com/emojis/1431240960506990592.webp?size=96","Rocket Mace":"https://cdn.discordapp.com/emojis/1305399636030128178.webp?size=96","Rod Mace":"https://cdn.discordapp.com/emojis/1305399563716268095.webp?size=96","OG Mace":"https://cdn.discordapp.com/emojis/1305399676630994994.webp?size=96","Spear Mace":"https://cdn.discordapp.com/emojis/1463390685972660288.webp?size=96" };
const OVERALL_ICON = "https://cdn.discordapp.com/emojis/1487324288175308971.webp?size=96";
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR1Z8SzplonsR2NbZ20b6TazugXY4YjX3sMeIxGG_cXErabJUERRszTqoOX7RPAYQXnlfnwbQemEP7k/pub?output=csv";
const REGION_COLUMN_INDEX = 2;
let allRows = [], nameCol = "", pointsCol = "", regionCol = "__region";

function getRoleByPoints(p) {
  const pts = parseFloat(p);
  if (isNaN(pts)) return null;
  if (pts >= 100) return { name:"Mace Master", icon:"<i class='fas fa-crown'></i>", className:"master", symbol:"🏆" };
  if (pts >= 50) return { name:"Mace Ace", icon:"<i class='fas fa-shield-alt'></i>", className:"ace", symbol:"⚡" };
  if (pts >= 25) return { name:"Mace Specialist", icon:"<i class='fas fa-star'></i>", className:"specialist", symbol:"✨" };
  if (pts >= 10) return { name:"Mace Cadet", icon:"<i class='fas fa-user-graduate'></i>", className:"cadet", symbol:"🎓" };
  if (pts >= 5) return { name:"Mace Novice", icon:"<i class='fas fa-feather-alt'></i>", className:"novice", symbol:"🌱" };
  if (pts >= 1) return { name:"Mace Rookie", icon:"<i class='fas fa-baby-carriage'></i>", className:"rookie", symbol:"🍼" };
  return null;
}
function getRankBadge(p, modal=false) { const r = getRoleByPoints(p); if(!r) return ''; const cls = modal ? 'text-lg px-4 py-1' : 'text-xs px-2 py-0.5'; return `<span class="rank ${r.className} ${cls}"><i class="${r.icon.split(' ')[1]}"></i> ${r.name} ${r.symbol}</span>`; }
function getLargeRankBadge(p) { const r = getRoleByPoints(p); if(!r) return ''; return `<span class="rank ${r.className} rank-large"><i class="${r.icon.split(' ')[1]}"></i> ${r.name} ${r.symbol}</span>`; }

function parseCSV(text) {
  const lines = text.split(/\r?\n/).filter(l=>l.trim());
  const headers = lines[0].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(h=>h.replace(/"/g,'').trim());
  const data = lines.slice(1).map(l=>{
    const cells = l.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c=>c.replace(/"/g,'').trim());
    const obj = {};
    headers.forEach((h,i)=>obj[h]=cells[i]||"");
    obj["__region"] = cells[REGION_COLUMN_INDEX] || "";
    return obj;
  });
  return { headers, data };
}

function getModeIconsHTML(player) {
  let html = '<div class="mode-icons">';
  const orderedModes = ["LT Mace","HT Mace","Rocket Mace","Rod Mace","OG Mace","Spear Mace"];
  orderedModes.forEach(mode => {
    const rawTier = player[mode];
    if (!rawTier) return;
    const parsed = parseTierString(rawTier);
    if (!parsed) return;
    const displayTier = parsed.display;
    const baseTier = parsed.baseTier;
    const peakTier = parsed.peakTier;
    const iconUrl = modeIcons[mode];
    const color = tierColors[baseTier] || "#666";
    let tooltipText = "";
    if (peakTier) {
      const pts = tierPointsMap[peakTier] || "?";
      tooltipText = `Peak: ${peakTier} → ${pts} points`;
    } else {
      const pts = tierPointsMap[baseTier] || "?";
      tooltipText = `${displayTier} → ${pts} points`;
    }
    html += `<div class="mode-icon-container"><img src="${iconUrl}" class="mode-icon" style="border-color: ${color};"><div class="mode-tier" style="background:${color}; color:#000;" data-tooltip="${tooltipText}">${displayTier}</div></div>`;
  });
  html += '</div>';
  return html;
}

function updateModeTitleWithKitButton(mode) {
  const container = document.getElementById("mode-title-container");
  if (!container) return;
  let existing = document.getElementById("kit-info-wrapper");
  if (existing) existing.remove();
  if (mode !== "Overall") {
    const wrapper = document.createElement("div");
    wrapper.id = "kit-info-wrapper";
    wrapper.className = "flex justify-between items-center mb-6";
    const title = document.createElement("h2");
    title.id = "mode-title";
    title.className = "text-2xl";
    title.textContent = mode + " Rankings";
    wrapper.appendChild(title);
    const btn = document.createElement("button");
    btn.textContent = "Kit Info";
    btn.className = "kit-info-btn bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded-lg transition shadow-md";
    btn.onclick = (e) => { e.stopPropagation(); showKitInfo(mode); };
    wrapper.appendChild(btn);
    container.innerHTML = "";
    container.appendChild(wrapper);
  } else {
    const title = document.createElement("h2");
    title.id = "mode-title";
    title.className = "text-2xl mb-6";
    title.textContent = "Overall Rankings";
    container.innerHTML = "";
    container.appendChild(title);
  }
}

async function loadCSV() {
  const res = await fetch(CSV_URL);
  const text = await res.text();
  const { headers, data } = parseCSV(text);
  allRows = data;
  nameCol = headers.find(h=>/name|player/i.test(h)) || headers[0];
  pointsCol = headers.find(h=>/points/i.test(h)) || headers[1];
  const allModes = ["Overall","LT Mace","HT Mace","Rocket Mace","OG Mace","Rod Mace","Spear Mace"];
  const tabsDiv = document.getElementById("tabs");
  tabsDiv.innerHTML = "";
  allModes.forEach((mode, idx) => {
    const wrapper = document.createElement("div");
    wrapper.className = "tab-item";
    let iconUrl = mode === "Overall" ? OVERALL_ICON : modeIcons[mode] || "";
    const img = document.createElement("img");
    img.src = iconUrl;
    img.className = "tab-icon";
    img.style.width = "36px";
    img.style.height = "36px";
    img.style.borderRadius = "8px";
    const btn = document.createElement("button");
    btn.textContent = mode;
    btn.className = "tab px-4 py-2 bg-gray-800 rounded-xl";
    if(idx === 0) btn.classList.add("tab-active");
    btn.onclick = (e) => { e.stopPropagation(); loadMode(mode, btn); };
    wrapper.appendChild(img);
    wrapper.appendChild(btn);
    wrapper.addEventListener("click", (e) => { if(e.target !== btn) btn.click(); });
    tabsDiv.appendChild(wrapper);
  });
  const active = document.querySelector("#tabs .tab-active");
  if(active) loadMode("Overall", active);
}

function loadMode(mode, activeBtn) {
  document.querySelectorAll("#tabs .tab").forEach(b=>b.classList.remove("tab-active"));
  activeBtn.classList.add("tab-active");
  updateModeTitleWithKitButton(mode);
  let htmlOut = "";
  if (mode === "Overall") {
    const sorted = [...allRows].sort((a,b)=>parseFloat(b[pointsCol]||0)-parseFloat(a[pointsCol]||0));
    sorted.forEach((r, idx) => {
      const name = r[nameCol];
      if(!name) return;
      const pointsVal = parseFloat(r[pointsCol]||0);
      const avatar = `https://mc-heads.net/avatar/${encodeURIComponent(name)}/64`;
      const region = r[regionCol];
      let medalClass = "", medalIcon = "";
      if(idx===0){ medalClass="gold"; medalIcon="<i class='fas fa-medal medal-icon'></i>"; }
      else if(idx===1){ medalClass="silver"; medalIcon="<i class='fas fa-medal medal-icon'></i>"; }
      else if(idx===2){ medalClass="bronze"; medalIcon="<i class='fas fa-medal medal-icon'></i>"; }
      const rankBadge = getLargeRankBadge(pointsVal);
      let regionHTML = "";
      if(region) {
        let rc = ""; const reg = region.toUpperCase().trim();
        if(reg==="EU") rc="EU"; else if(reg==="AS") rc="AS"; else if(reg==="NA") rc="NA"; else if(reg==="SA") rc="SA"; else if(reg==="AU") rc="AU";
        regionHTML = `<span class="region-badge ${rc}">${region}</span>`;
      }
      htmlOut += `<div class="player-card relative overflow-hidden ${medalClass}" data-player='${JSON.stringify(r).replace(/'/g, "&apos;")}' data-points="${pointsVal}">${idx < 3 ? `<div class="absolute inset-0 pointer-events-none" style="background: linear-gradient(135deg, rgba(255,215,0,0.25) 0%, rgba(192,192,192,0.2) 40%, rgba(205,127,50,0.2) 60%, rgba(0,0,0,0) 75%); clip-path: polygon(0 0, 70% 0, 55% 100%, 0% 100%);"></div>` : ""}<img src="${avatar}" class="player-img"><div class="flex-1 flex flex-col justify-center min-w-0"><div class="flex items-center flex-wrap gap-x-2 gap-y-1">${medalIcon}<span class="font-bold">${idx+1}.</span> ${name}${regionHTML}</div>${getModeIconsHTML(r)}</div><div class="flex items-center gap-4 relative z-10 flex-shrink-0 flex-wrap justify-end">${rankBadge}<div class="font-mono text-xl font-bold text-red-400 flex items-center gap-1">${r[pointsCol]} <span class="text-sm text-gray-300 font-medium">pts</span></div></div></div>`;
    });
  } else {
    const groups = {};
    allRows.forEach(r => {
      const name = r[nameCol];
      if(!name) return;
      const raw = r[mode];
      if(!raw) return;
      const baseTier = extractBaseTier(raw);
      if(!baseTier) return;
      if(!groups[baseTier]) groups[baseTier]=[];
      groups[baseTier].push(r);
    });
    tierOrder.forEach(tier => {
      if(!groups[tier]) return;
      const pointsValue = tierPointsMap[tier] || "?";
      const tooltip = `${tier} → ${pointsValue} points`;
      htmlOut += `<div class="mb-6"><div class="tier-header" style="background:${tierColors[tier]}" data-tooltip="${tooltip}">${tier}</div>`;
      groups[tier].forEach(r => {
        const name = r[nameCol];
        const avatar = `https://mc-heads.net/avatar/${encodeURIComponent(name)}/64`;
        const region = r[regionCol];
        const pointsVal = parseFloat(r[pointsCol]||0);
        const rankBadge = getRankBadge(pointsVal, false);
        let regionHTML = "";
        if(region) {
          let rc = ""; const reg = region.toUpperCase().trim();
          if(reg==="EU") rc="EU"; else if(reg==="AS") rc="AS"; else if(reg==="NA") rc="NA"; else if(reg==="SA") rc="SA"; else if(reg==="AU") rc="AU";
          regionHTML = `<span class="region-badge ${rc}">${region}</span>`;
        }
        htmlOut += `<div class="player-card" data-player='${JSON.stringify(r).replace(/'/g, "&apos;")}' data-points="${pointsVal}"><img src="${avatar}" class="player-img"><div class="flex items-center gap-2 flex-wrap flex-1"><span class="font-semibold">${name}</span>${regionHTML}${rankBadge}</div><div class="ml-auto font-mono text-sm">${r[pointsCol] || 0} pts</div></div>`;
      });
      htmlOut += `</div>`;
    });
  }
  document.getElementById("rankings").innerHTML = htmlOut;

  function getOverallRank(pObj) {
    const sorted = [...allRows].sort((a,b)=>parseFloat(b[pointsCol]||0)-parseFloat(a[pointsCol]||0));
    const pName = pObj[nameCol];
    const pPoints = parseFloat(pObj[pointsCol]||0);
    const idx = sorted.findIndex(p => p[nameCol] === pName && parseFloat(p[pointsCol]||0) === pPoints);
    return idx !== -1 ? idx+1 : null;
  }

  document.querySelectorAll(".player-card").forEach(card => {
    card.onclick = () => {
      const p = JSON.parse(card.dataset.player.replace(/&apos;/g, "'"));
      const avatar = `https://mc-heads.net/avatar/${encodeURIComponent(p[nameCol])}/128`;
      const region = p[regionCol];
      const pointsVal = parseFloat(p[pointsCol]||0);
      const overallRank = getOverallRank(p);
      const role = getRoleByPoints(pointsVal);
      let roleHtml = '';
      if(role) roleHtml = `<div class="flex justify-center mt-3"><div class="rank ${role.className} text-xl px-5 py-2 rounded-full inline-flex items-center gap-2">${role.icon} ${role.name} ${role.symbol}</div></div>`;
      let regionInline = '';
      if(region) {
        let rc = ""; const reg = region.toUpperCase().trim();
        if(reg==="EU") rc="EU"; else if(reg==="AS") rc="AS"; else if(reg==="NA") rc="NA"; else if(reg==="SA") rc="SA"; else if(reg==="AU") rc="AU";
        regionInline = `<span class="region-badge ${rc} ml-2 align-middle">${region}</span>`;
      }
      let modalHtml = `<div class="flex justify-center mb-4"><img src="${avatar}" style="width:128px;height:128px;border-radius:50%;border:3px solid #db3e3e;"></div><h2 class="text-2xl font-bold text-center">${p[nameCol]} ${regionInline}</h2>${roleHtml}<div class="mt-6">${getModeIconsHTML(p)}</div>`;
      if(overallRank) modalHtml += `<div class="text-center mt-4 pt-2"><span class="text-gray-400">Overall Position:</span><span class="text-lg font-bold text-yellow-400">#${overallRank}</span></div>`;
      modalHtml += `<div class="text-center mt-2 pt-2 border-t border-gray-600"><span class="text-gray-400">Overall Points:</span><span class="text-xl font-bold text-red-400">${p[pointsCol]}</span></div>`;
      document.getElementById("modal-content").innerHTML = modalHtml;
      document.getElementById("player-modal").classList.remove("hidden");
    };
  });
}

let autoInterval;
function startAutoSwitch(ms) {
  if(autoInterval) clearInterval(autoInterval);
  autoInterval = setInterval(() => {
    const firstTab = document.querySelector("#tabs .tab-item:first-child button");
    if(firstTab && !firstTab.classList.contains("tab-active")) firstTab.click();
  }, ms);
}

document.getElementById("search-input").addEventListener("input", e => {
  const term = e.target.value.toLowerCase();
  document.querySelectorAll(".player-card").forEach(card => {
    card.style.display = card.textContent.toLowerCase().includes(term) ? "flex" : "none";
  });
});
document.getElementById("modal-close").onclick = () => document.getElementById("player-modal").classList.add("hidden");

window.onload = () => {
  createParticles();
  loadCSV().then(() => startAutoSwitch(60000));
  setInterval(() => loadCSV().catch(console.warn), 60000);
};
</script>
</body>
</html>
