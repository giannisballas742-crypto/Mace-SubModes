<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mace SubModes Tiers • Rankings</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
body { background:#0a0a0a; color:#e5e5e5; font-family:system-ui; }
.tab { transition:0.2s; cursor:pointer; }
.tab-active { background:#db3e3e; color:black; font-weight:700; box-shadow:0 0 20px rgba(219,62,62,0.6); }
.player-card { background:#1f2937; padding:10px; border-radius:12px; display:flex; align-items:center; gap:10px; margin-bottom:8px; transition:0.2s; cursor:pointer; }
.player-card:hover { transform:translateY(-3px); box-shadow:0 10px 20px rgba(219,62,62,0.4); }
.player-img { width:40px; height:40px; border-radius:50%; border:2px solid #db3e3e; }
.tier-header { font-weight:800; padding:8px 16px; border-radius:999px; margin-bottom:10px; display:inline-block; }
.discord-btn { background:#7289da; padding:5px 12px; border-radius:8px; }
#search-input { padding:8px; border-radius:8px; width:100%; max-width:400px; margin-bottom:16px; background:#1f2937; color:#e5e5e5; border:none; }
.region-badge { padding:2px 6px; border-radius:6px; font-size:0.8rem; color:#000; font-weight:600; margin-left:6px; }
.modal-bg { background: rgba(0,0,0,0.7); position:fixed; inset:0; display:flex; justify-content:center; align-items:center; z-index:50; }
.modal { background:#1f2937; padding:20px; border-radius:12px; max-width:400px; width:90%; }
.modal-close { cursor:pointer; float:right; font-weight:bold; }
</style>
</head>
<body>
<div class="max-w-6xl mx-auto p-6">

<!-- HEADER -->
<div class="flex justify-between items-center mb-6">
  <div class="flex items-center gap-4">
    <div class="w-14 h-14 rounded-xl overflow-hidden flex items-center justify-center">
      <img src="DIRECT_LOGO_IMAGE_URL_HERE" alt="Logo" class="w-full h-full object-cover">
    </div>
    <div>
      <h1 class="text-4xl font-black">Mace SubModes Tiers</h1>
      <p class="text-red-400 text-sm">Mace PvP Rankings</p>
    </div>
  </div>
  <div class="text-right flex flex-col items-end gap-2">
    <a href="https://discord.gg/qHXgUhVj" target="_blank" class="discord-btn">
      <i class="fab fa-discord"></i> Join Discord
    </a>
    <div class="text-gray-400 text-sm">Your Server</div>
    <div class="text-red-400 font-mono">mcpvp.club</div>
  </div>
</div>

<!-- SEARCH -->
<input type="text" id="search-input" placeholder="Search players...">

<!-- TABS -->
<div id="tabs" class="flex gap-3 mb-6 flex-wrap"></div>

<h2 id="mode-title" class="text-2xl mb-6">Overall Rankings</h2>
<div id="rankings"></div>

<!-- PLAYER MODAL -->
<div id="player-modal" class="hidden modal-bg">
  <div class="modal">
    <span class="modal-close" id="modal-close">&times;</span>
    <div id="modal-content"></div>
  </div>
</div>

</div>

<script>
// === CONFIGURE CSV ===
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR1Z8SzplonsR2NbZ20b6TazugXY4YjX3sMeIxGG_cXErabJUERRszTqoOX7RPAYQXnlfnwbQemEP7k/pub?output=csv"; // <-- Replace with your published CSV link

// Tier order and colors
const tierOrder = ["HT1","LT1","HT2","LT2","HT3","LT3","HT4","LT4","HT5","LT5"];
const tierColors = { HT1:"#ff4d4d", LT1:"#ff9999", HT2:"#ffaa00", LT2:"#ffd27f", HT3:"#55ff55", LT3:"#aaffaa", HT4:"#55ffff", LT4:"#aaffff", HT5:"#5555ff", LT5:"#aaaaff" };

// Variables
let allRows = [], allModes = [], nameCol = "", pointsCol = "", regionCol = "";
const tabsDiv = document.getElementById("tabs");

// CSV parser
function parseCSV(text){
  const lines = text.split(/\r?\n/).filter(l=>l.trim());
  const headers = lines[0].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(h=>h.replace(/"/g,'').trim());
  const data = lines.slice(1).map(l=>{
    const cells = l.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c=>c.replace(/"/g,'').trim());
    const obj = {};
    headers.forEach((h,i)=>obj[h]=cells[i]||"");
    return obj;
  });
  return { headers, data };
}

// Load CSV
async function loadCSV(){
  try{
    const res = await fetch(CSV_URL);
    const text = await res.text();
    const { headers, data } = parseCSV(text);
    allRows = data;

    nameCol = headers.find(h=>/name|player/i.test(h)) || headers[0];
    pointsCol = headers.find(h=>/points/i.test(h)) || headers[1];
    regionCol = headers.find(h=>/region/i.test(h));

    // Only the real modes
    allModes = ["Overall","LT Mace","HT Mace","Rocket Mace","OG Mace","Rod Mace","Spear Mace"];

    tabsDiv.innerHTML = "";
    allModes.forEach((mode,i)=>{
      const btn = document.createElement("button");
      btn.textContent = mode;
      btn.className = "tab px-4 py-2 bg-gray-800 rounded-xl";
      if(i===0) btn.classList.add("tab-active");
      btn.onclick = ()=>loadMode(mode,btn);
      tabsDiv.appendChild(btn);
    });

    loadMode("Overall", document.querySelector("#tabs button"));
  }catch(e){
    document.getElementById("rankings").innerHTML="<p class='text-red-400 py-20'>Failed to load data</p>";
    console.error(e);
  }
}

// Load mode
function loadMode(mode,btn){
  document.querySelectorAll("#tabs button").forEach(b=>b.classList.remove("tab-active"));
  btn.classList.add("tab-active");
  document.getElementById("mode-title").textContent = mode+" Rankings";

  let htmlOut = "";

  if(mode==="Overall"){
    const sorted = [...allRows].sort((a,b)=>parseFloat(b[pointsCol]||0)-parseFloat(a[pointsCol]||0));
    sorted.forEach((r,i)=>{
      const name = r[nameCol].trim();
      if(!name) return;
      const avatar = `https://mc-heads.net/avatar/${encodeURIComponent(name)}/64`;
      const region = r[regionCol];
      const regionColor = r[regionCol+" Color"] || "#999";
      htmlOut += `<div class="player-card" data-player='${JSON.stringify(r)}'>
        <img src="${avatar}" class="player-img">
        <div class="flex-1">${i+1}. ${name}</div>
        ${region ? `<span class="region-badge" style="background:${regionColor}">${region}</span>` : ""}
        <div>${r[pointsCol]}</div>
      </div>`;
    });
  } else {
    const groups = {};
    allRows.forEach(r=>{
      const name = r[nameCol].trim();
      const tier = (r[mode]||"").toUpperCase();
      if(!name || !tier) return;
      if(!groups[tier]) groups[tier]=[];
      groups[tier].push(r);
    });
    tierOrder.forEach(tier=>{
      if(!groups[tier]) return;
      htmlOut += `<div class="mb-6">
        <div class="tier-header" style="background:${tierColors[tier]}">${tier}</div>`;
      groups[tier].forEach(r=>{
        const name = r[nameCol];
        const avatar = `https://mc-heads.net/avatar/${encodeURIComponent(name)}/64`;
        const region = r[regionCol];
        const regionColor = r[regionCol+" Color"] || "#999";
        htmlOut += `<div class="player-card" data-player='${JSON.stringify(r)}'>
          <img src="${avatar}" class="player-img">
          <div>${name}</div>
          ${region ? `<span class="region-badge" style="background:${regionColor}">${region}</span>` : ""}
        </div>`;
      });
      htmlOut += `</div>`;
    });
  }

  document.getElementById("rankings").innerHTML = htmlOut || "<p class='text-gray-500 py-20'>No data yet...</p>";

  // Player modal
  document.querySelectorAll(".player-card").forEach(card=>{
    card.onclick = ()=>{
      const data = JSON.parse(card.dataset.player);
      const avatar = `https://mc-heads.net/avatar/${encodeURIComponent(data[nameCol])}/128`;
      const region = data[regionCol];
      const regionColor = data[regionCol+" Color"] || "#999";
      let modalHTML = `<div class="flex justify-center mb-4"><img src="${avatar}" class="player-img" style="width:128px;height:128px;border:3px solid #db3e3e;"></div>`;
      modalHTML += `<h2 class="text-xl font-bold mb-2">${data[nameCol]}</h2>`;
      if(region) modalHTML += `<div class="region-badge mb-2" style="background:${regionColor}">${region}</div>`;
      modalHTML += `<ul class="list-disc pl-6 mt-2">`;
      allModes.slice(1).forEach(m=>{
        if(data[m]) modalHTML += `<li>${m}: ${data[m]}</li>`;
      });
      modalHTML += `<li>Overall Points: ${data[pointsCol]}</li></ul>`;
      document.getElementById("modal-content").innerHTML = modalHTML;
      document.getElementById("player-modal").classList.remove("hidden");
    };
  });
}

// SEARCH
document.getElementById("search-input").addEventListener("input", e=>{
  const term = e.target.value.toLowerCase();
  document.querySelectorAll(".player-card").forEach(card=>{
    const name = card.querySelector("div").textContent.toLowerCase();
    card.style.display = name.includes(term) ? "flex" : "none";
  });
});

// MODAL CLOSE
document.getElementById("modal-close").onclick = ()=>{ document.getElementById("player-modal").classList.add("hidden"); };

// INIT
loadCSV();
setInterval(()=>{
  const active = document.querySelector(".tab-active");
  if(active) loadMode(active.textContent,active);
},30000);
</script>
</body>
</html>
