    const s = Math.random() * 5 + 2;
    p.style.width = `${s}px`;
    p.style.height = `${s}px`;
    p.style.left = `${Math.random() * 100}vw`;
    p.style.animationDuration = `${Math.random() * 18 + 12}s`;
    p.style.animationDelay = `-${Math.random() * 25}s`;
    p.style.opacity = Math.random() * 0.45 + 0.2;
    p.style.background = `#db3e3e`;
    container.appendChild(p);
  }
}

// ========== TIER LOGIC with R-prefix detection ==========
const tierPointsMap = { "HT1":60,"LT1":45,"HT2":30,"LT2":20,"HT3":10,"LT3":6,"HT4":4,"LT4":3,"HT5":2,"LT5":1 };
const tierOrder = ["HT1","LT1","HT2","LT2","HT3","LT3","HT4","LT4","HT5","LT5"];
const tierColors = { HT1:"#f1c40f", LT1:"#ffa600", HT2:"#bdc3c7", LT2:"#95a5a6", HT3:"#ff8531", LT3:"#f37324", HT4:"#55ffff", LT4:"#aaffff", HT5:"#5555ff", LT5:"#AAAAFF" };

function extractBaseTierFromCode(tierCode) {
  const match = tierCode.match(/(HT[1-5]|LT[1-5])/i);
  if (match) return match[1].toUpperCase();
  return null;
}

function parseTierString(tierStr) {
  if (!tierStr) return null;
  const upper = tierStr.toUpperCase().trim();
  const peakMatch = upper.match(/^(.*?)\s*\(\s*PEAK\s+(HT[1-5]|LT[1-5])\s*\)$/i);
  let rawDisplay = upper;
  let peakTier = null;
  if (peakMatch) {
    rawDisplay = peakMatch[1].trim();
    peakTier = peakMatch[2].toUpperCase();
  }
  const hasRPrefix = /^R(HT|LT)/i.test(rawDisplay);
  const baseTier = extractBaseTierFromCode(rawDisplay);
  if (!baseTier) return null;
  return { display: rawDisplay, baseTier: baseTier, peakTier: peakTier, hasRPrefix: hasRPrefix };
}

function extractBaseTier(rawTier) {
  const parsed = parseTierString(rawTier);
  return parsed ? parsed.baseTier : null;
}

  const pts = parseFloat(p);
  if (isNaN(pts)) return null;
  if (pts >= 100) return { name:"Mace Master", icon:"<i class='fas fa-crown'></i>", className:"master", symbol:"🏆" };
  if (pts >= 50) return { name:"Mace Ace", icon:"<i class='fas fa-shield-alt'></i>", className:"ace", symbol:"⚡" };
  if (pts >= 25) return { name:"Mace Specialist", icon:"<i class='fas fa-star'></i>", className:"specialist", symbol:"✨" };
  if (pts >= 10) return { name:"Mace Cadet", icon:"<i class='fas fa-user-graduate'></i>", className:"cadet", symbol:"🎓" };
  if (pts >= 5) return { name:"Mace Novice", icon:"<i class='fas fa-feather-alt'></i>", className:"novice", symbol:"🌱" };
  if (pts >= 1) return { name:"Mace Rookie", icon:"<i class='fas fa-baby-carriage'></i>", className:"rookie", symbol:"🍼" };
  return null;
}
function getRankBadge(p, modal=false) { const r = getRoleByPoints(p); if(!r) return ''; const cls = modal ? 'text-lg px-4 py-1' : 'text-xs px-2 py-0.5'; return `<span class="rank ${r.className} ${cls}"><i class="${r.icon.split(' ')[1]}"></i> ${r.name} ${r.symbol}</span>`; }
function getLargeRankBadge(p) { const r = getRoleByPoints(p); if(!r) return ''; return `<span class="rank ${r.className} rank-large"><i class="${r.icon.split(' ')[1]}"></i> ${r.name} ${r.symbol}</span>`; }

function parseCSV(text) {
  const lines = text.split(/\r?\n/).filter(l=>l.trim());
  const headers = lines[0].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(h=>h.replace(/"/g,'').trim());
  const data = lines.slice(1).map(l=>{
    const cells = l.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c=>c.replace(/"/g,'').trim());
    const obj = {};
    headers.forEach((h,i)=>obj[h]=cells[i]||"");
    obj["__region"] = cells[REGION_COLUMN_INDEX] || "";
    return obj;
  });
  return { headers, data };
}

function getModeIconsHTML(player) {
  let html = '<div class="mode-icons">';
  const orderedModes = ["LT Mace","HT Mace","Rocket Mace","Rod Mace","OG Mace","Spear Mace"];
  orderedModes.forEach(mode => {
    const rawTier = player[mode];
    if (!rawTier) return;
    const parsed = parseTierString(rawTier);
    if (!parsed) return;
    const displayTier = parsed.display;
    const baseTier = parsed.baseTier;
    const peakTier = parsed.peakTier;
    const hasRPrefix = parsed.hasRPrefix;
    const iconUrl = modeIcons[mode];
    let bgColor = hasRPrefix ? "#0f2b6d" : (tierColors[baseTier] || "#666");
    let tooltipText = "";
    if (peakTier) {
      const pts = tierPointsMap[peakTier] || "?";
      tooltipText = ` Peak: ${peakTier} → ${pts} points`;
    } else {
      const pts = tierPointsMap[baseTier] || "?";
      tooltipText = `${displayTier} → ${pts} points`;
    }
    const extraClass = hasRPrefix ? 'r-prefix-tier' : '';
    html += `<div class="mode-icon-container" data-tooltip="${tooltipText}"><img src="${iconUrl}" class="mode-icon" style="border-color: ${bgColor};"><div class="mode-tier ${extraClass}" style="${!hasRPrefix ? `background:${bgColor}; color:#000;` : ''}">${displayTier}</div></div>`;
  });
  html += '</div>';
  return html;
}

function updateModeTitleWithKitButton(mode) {
  const container = document.getElementById("mode-title-container");
  if (!container) return;
  let existing = document.getElementById("kit-info-wrapper");
  if (existing) existing.remove();
  if (mode !== "Overall") {
    const wrapper = document.createElement("div");
    wrapper.id = "kit-info-wrapper";
    wrapper.className = "flex justify-between items-center mb-6 flex-wrap gap-3";
    const title = document.createElement("h2");
    title.id = "mode-title";
    title.className = "text-2xl font-bold bg-gradient-to-r from-red-400 to-red-600 bg-clip-text text-transparent";
    title.textContent = mode + " Rankings";
    wrapper.appendChild(title);
    const btn = document.createElement("button");
    btn.textContent = "📦 Kit Info";
    btn.className = "kit-info-btn bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-5 rounded-lg transition shadow-md flex items-center gap-2";
    btn.onclick = (e) => { e.stopPropagation(); showKitInfo(mode); };
    wrapper.appendChild(btn);
    container.innerHTML = "";
    container.appendChild(wrapper);
  } else {
    const title = document.createElement("h2");
    title.id = "mode-title";
    title.className = "text-2xl font-bold mb-6 border-l-4 border-red-500 pl-3";
    title.textContent = "🏆 Overall Rankings";
    container.innerHTML = "";
    container.appendChild(title);
  }
}

async function loadCSV() {
  const res = await fetch(CSV_URL);
  const text = await res.text();
  const { headers, data } = parseCSV(text);
  allRows = data;
  nameCol = headers.find(h=>/name|player/i.test(h)) || headers[0];
  pointsCol = headers.find(h=>/points/i.test(h)) || headers[1];
  const allModes = ["Overall","LT Mace","HT Mace","Rocket Mace","OG Mace","Rod Mace","Spear Mace"];
  const tabsDiv = document.getElementById("tabs");
  tabsDiv.innerHTML = "";
  allModes.forEach((mode, idx) => {
    const wrapper = document.createElement("div");
    wrapper.className = "tab-item";
    let iconUrl = mode === "Overall" ? OVERALL_ICON : modeIcons[mode] || "";
    const img = document.createElement("img");
    img.src = iconUrl;
    img.className = "tab-icon";
    img.style.width = "36px";
    img.style.height = "36px";
    img.style.borderRadius = "8px";
    const btn = document.createElement("button");
    btn.textContent = mode;
    btn.className = "tab px-4 py-2 bg-gray-800 rounded-xl font-medium";
    if(idx === 0) btn.classList.add("tab-active");
    btn.onclick = (e) => { e.stopPropagation(); loadMode(mode, btn); };
    wrapper.appendChild(img);
    wrapper.appendChild(btn);
    wrapper.addEventListener("click", (e) => { if(e.target !== btn) btn.click(); });
    tabsDiv.appendChild(wrapper);
  });
  const active = document.querySelector("#tabs .tab-active");
  if(active) loadMode("Overall", active);
}

function renderModeGroupedByTier(mode) {
  const groups = { 1: { ht: [], lt: [] }, 2: { ht: [], lt: [] }, 3: { ht: [], lt: [] }, 4: { ht: [], lt: [] }, 5: { ht: [], lt: [] } };
  allRows.forEach(r => {
    const rawTier = r[mode];
    if (!rawTier) return;
    const parsed = parseTierString(rawTier);
    if (!parsed) return;
    const baseTier = parsed.baseTier;
    const match = baseTier.match(/^(HT|LT)([1-5])$/);
    if (!match) return;
    const tierNum = parseInt(match[2], 10);
    const type = match[1];
    const pointsVal = parseFloat(r[pointsCol] || 0);
    groups[tierNum][type === 'HT' ? 'ht' : 'lt'].push({ player: r, points: pointsVal, subTier: baseTier });
  });
  let gridHtml = '<div class="tier-grid">';
  // always show all tiers 1 to 5 (strict rule)
  for (let t = 1; t <= 5; t++) {
    const htPlayers = groups[t].ht;
    const ltPlayers = groups[t].lt;
    let headerClass = 'tier-group-header ';
    if (t === 1) headerClass += 'gold';
    else if (t === 2) headerClass += 'silver';
    else if (t === 3) headerClass += 'bronze';
    else if (t === 4) headerClass += 'iron';
    else headerClass += 'purple';
    let columnHtml = `<div class="tier-column"><div class="${headerClass}">TIER ${t}</div>`;
    const allPlayers = [...htPlayers.sort((a,b)=>b.points - a.points), ...ltPlayers.sort((a,b)=>b.points - a.points)];
    if (allPlayers.length === 0) {
      columnHtml += `<div class="empty-tier-message">— No players —</div>`;
    } else {
      allPlayers.forEach(item => {
        const p = item.player;
        const name = p[nameCol];
        const avatar = `https://mc-heads.net/avatar/${encodeURIComponent(name)}/64`;
        const region = p[regionCol];
        const pointsVal = item.points;
        const rankBadge = getRankBadge(pointsVal, false);
        let regionHTML = "";
        if(region) {
          let rc = ""; const reg = region.toUpperCase().trim();
          if(reg==="EU") rc="EU"; else if(reg==="AS") rc="AS"; else if(reg==="NA") rc="NA"; else if(reg==="SA") rc="SA"; else if(reg==="AU") rc="AU";
          regionHTML = `<span class="region-badge ${rc}">${region}</span>`;
        }
        const subTierBadge = `<span class="sub-tier-badge ${item.subTier.startsWith('HT') ? 'sub-tier-ht' : 'sub-tier-lt'}">${item.subTier}</span>`;
        const playerTypeClass = item.subTier.startsWith('HT') ? 'player-ht' : 'player-lt';
        columnHtml += `<div class="player-card ${playerTypeClass}" data-player='${JSON.stringify(p).replace(/'/g, "&apos;")}' data-points="${pointsVal}">
          <img src="${avatar}" class="player-img">
          <div class="flex items-center gap-2 flex-wrap flex-1"><span class="font-semibold">${name}</span>${subTierBadge}${regionHTML}${rankBadge}</div>
          <div class="ml-auto font-mono text-sm">${p[pointsCol] || 0} pts</div>
        </div>`;
      });
    }
    columnHtml += `</div>`;
    gridHtml += columnHtml;
  }
  gridHtml += '</div>';
  return gridHtml;
}

function loadMode(mode, activeBtn) {
  document.querySelectorAll("#tabs .tab").forEach(b=>b.classList.remove("tab-active"));
  activeBtn.classList.add("tab-active");
  updateModeTitleWithKitButton(mode);
  let htmlOut = "";
  if (mode === "Overall") {
    const sorted = [...allRows].sort((a,b)=>parseFloat(b[pointsCol]||0)-parseFloat(a[pointsCol]||0));
    sorted.forEach((r, idx) => {
      const name = r[nameCol];
      if(!name) return;
      const pointsVal = parseFloat(r[pointsCol]||0);
      const avatar = `https://mc-heads.net/avatar/${encodeURIComponent(name)}/64`;
      const region = r[regionCol];
      let medalClass = "", medalIcon = "";
      let bgClass = "";
      if(idx===0){ medalClass="gold"; medalIcon="<i class='fas fa-medal medal-icon'></i>"; }
      else if(idx===1){ medalClass="silver"; medalIcon="<i class='fas fa-medal medal-icon'></i>"; }
      else if(idx===2){ medalClass="bronze"; medalIcon="<i class='fas fa-medal medal-icon'></i>"; }
      else { bgClass = "gray-bg"; }
      const rankBadge = getLargeRankBadge(pointsVal);
      let regionHTML = "";
      if(region) {
        let rc = ""; const reg = region.toUpperCase().trim();
        if(reg==="EU") rc="EU"; else if(reg==="AS") rc="AS"; else if(reg==="NA") rc="NA"; else if(reg==="SA") rc="SA"; else if(reg==="AU") rc="AU";
        regionHTML = `<span class="region-badge ${rc}">${region}</span>`;
      }
      htmlOut += `<div class="player-card relative overflow-visible ${medalClass} ${bgClass}" data-player='${JSON.stringify(r).replace(/'/g, "&apos;")}' data-points="${pointsVal}">${idx < 3 ? `<div class="absolute inset-0 pointer-events-none" style="background: linear-gradient(135deg, rgba(255,215,0,0.25) 0%, rgba(192,192,192,0.2) 40%, rgba(205,127,50,0.2) 60%, rgba(0,0,0,0) 75%); clip-path: polygon(0 0, 70% 0, 55% 100%, 0% 100%);"></div>` : ""}<img src="${avatar}" class="player-img"><div class="flex-1 flex flex-col justify-center min-w-0"><div class="flex items-center flex-wrap gap-x-2 gap-y-1">${medalIcon}<span class="font-bold">${idx+1}.</span> ${name}${regionHTML}</div>${getModeIconsHTML(r)}</div><div class="flex items-center gap-4 relative z-10 flex-shrink-0 flex-wrap justify-end">${rankBadge}<div class="font-mono text-xl font-bold text-red-400 flex items-center gap-1">${r[pointsCol]} <span class="text-sm text-gray-300 font-medium">pts</span></div></div></div>`;
    });
  } else {
    htmlOut = renderModeGroupedByTier(mode);
  }
  document.getElementById("rankings").innerHTML = htmlOut;

  function getOverallRank(pObj) {
    const sorted = [...allRows].sort((a,b)=>parseFloat(b[pointsCol]||0)-parseFloat(a[pointsCol]||0));
    const pName = pObj[nameCol];
    const pPoints = parseFloat(pObj[pointsCol]||0);
    const idx = sorted.findIndex(p => p[nameCol] === pName && parseFloat(p[pointsCol]||0) === pPoints);
    return idx !== -1 ? idx+1 : null;
  }

  document.querySelectorAll(".player-card").forEach(card => {
    card.onclick = () => {
      const p = JSON.parse(card.dataset.player.replace(/&apos;/g, "'"));
      const avatar = `https://mc-heads.net/avatar/${encodeURIComponent(p[nameCol])}/128`;
      const region = p[regionCol];
      const pointsVal = parseFloat(p[pointsCol]||0);
      const overallRank = getOverallRank(p);
      const role = getRoleByPoints(pointsVal);
      let roleHtml = '';
      if(role) roleHtml = `<div class="flex justify-center mt-3"><div class="rank ${role.className} text-xl px-5 py-2 rounded-full inline-flex items-center gap-2">${role.icon} ${role.name} ${role.symbol}</div></div>`;
      let regionInline = '';
      if(region) {
        let rc = ""; const reg = region.toUpperCase().trim();
        if(reg==="EU") rc="EU"; else if(reg==="AS") rc="AS"; else if(reg==="NA") rc="NA"; else if(reg==="SA") rc="SA"; else if(reg==="AU") rc="AU";
        regionInline = `<span class="region-badge ${rc} ml-2 align-middle">${region}</span>`;
      }
      let modalHtml = `<div class="flex justify-center mb-4"><img src="${avatar}" style="width:128px;height:128px;border-radius:50%;border:3px solid #db3e3e;"></div><h2 class="text-2xl font-bold text-center">${p[nameCol]} ${regionInline}</h2>${roleHtml}<div class="mt-6">${getModeIconsHTML(p)}</div>`;
      if(overallRank) modalHtml += `<div class="text-center mt-4 pt-2"><span class="text-gray-400">Overall Position:</span><span class="text-lg font-bold text-yellow-400 ml-2">#${overallRank}</span></div>`;
      modalHtml += `<div class="text-center mt-2 pt-2 border-t border-gray-600"><span class="text-gray-400">Overall Points:</span><span class="text-xl font-bold text-red-400 ml-2">${p[pointsCol]}</span></div>`;
      document.getElementById("modal-content").innerHTML = modalHtml;
      document.getElementById("player-modal").classList.remove("hidden");
    };
  });
}

document.getElementById("search-input").addEventListener("input", e => {
  const term = e.target.value.toLowerCase();
  document.querySelectorAll(".player-card").forEach(card => {
    card.style.display = card.textContent.toLowerCase().includes(term) ? "flex" : "none";
  });
});
document.getElementById("modal-close").onclick = () => document.getElementById("player-modal").classList.add("hidden");

window.onload = () => {
  createParticles();
  loadCSV().then(() => {});
  setInterval(() => loadCSV().catch(console.warn), 60000);
};
</script>
